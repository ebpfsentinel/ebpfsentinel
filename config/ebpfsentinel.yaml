# eBPFsentinel — Default Configuration
#
# Adapt `agent.interfaces` to your host network interface(s).
# See config/ebpfsentinel.example.yaml for all available options.

agent:
  # Network interfaces to attach eBPF programs to (REQUIRED).
  # Change to match your host: ip -o link show | awk -F': ' '{print $2}'
  interfaces: [eth0]

  # IP address to bind HTTP/gRPC/metrics listeners to.
  # Use "0.0.0.0" to listen on all interfaces, "127.0.0.1" for localhost only.
  # Note: with Docker network_mode: host, this controls the actual host bind
  # address — "127.0.0.1" means only local access, even in a container.
  bind_address: "127.0.0.1"

  # Allow the control API to listen on a non-loopback address while
  # authentication is disabled. Default false: binding to anything other than
  # 127.0.0.1/::1 with `auth.enabled: false` is rejected, because it exposes an
  # unauthenticated control plane (firewall, IPS, config reload) to the network.
  # Enable auth instead, or set this to true only when the API is fenced off by
  # other means (trusted network, service mesh, authenticating proxy).
  # allow_unauthenticated_api: false

  # Serve the Swagger UI at /swagger-ui (useful for development/debugging).
  swagger_ui: false

  # Rate limit for the mutating (POST/DELETE/PATCH/PUT) control-plane API,
  # per client IP (GCRA token bucket). Read endpoints keep a separate, looser
  # limit. Defaults shown: 60-request burst refilling at 1/s (= 60/min). Raise
  # these if you drive bulk reconfiguration through the API. Loopback clients
  # are exempt by default, so same-host tooling and bulk loads are never
  # throttled; set exempt_loopback: false to rate-limit local clients too.
  # api_rate_limit:
  #   write_per_second: 1
  #   write_burst: 60
  #   exempt_loopback: true

  # XDP attachment mode: auto, native, generic, or offloaded.
  # auto (default): kernel picks best available (native → generic fallback).
  # native: driver-mode XDP (fastest, requires driver support — e.g. virtio_net, mlx5, i40e).
  # generic: SKB-mode XDP (universal but slower — packets allocated as sk_buff first).
  # offloaded: hardware offload to SmartNIC (requires NIC support — e.g. Netronome NFP).
  # If the requested mode is unsupported, falls back to auto with a warning.
  xdp_mode: auto

  log_level: info
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

  # BPF token delegation (kernel 6.9+ REQUIRED). eBPF is loaded
  # exclusively through a BPF token — the agent never loads programs with
  # CAP_BPF. BPF tokens are a user-namespace feature, so the agent is
  # started by `ebpfsentinel-token-launch`, which sets up the delegated
  # bpffs in a child user namespace and execs the agent there (rootless).
  # `bpffs_path` MUST match the launcher's --bpffs argument. Override only
  # if you run the launcher with a non-default mount path.
  # bpf_token:
  #   bpffs_path: /sys/fs/bpf/ebpfsentinel

  # TLS for HTTP and gRPC listeners. Disabled by default (plaintext).
  # tls:
  #   enabled: true
  #   cert_path: /etc/ebpfsentinel/tls/tls.crt
  #   key_path: /etc/ebpfsentinel/tls/tls.key
  #   pq_mode: prefer        # prefer | require | disable (post-quantum hybrid X25519MLKEM768)
  #   allow_tls12: false      # default: TLS 1.3 only. Set true for legacy clients.

  # gRPC reflection — disabled by default (prevents unauthenticated API schema enumeration).
  # Enable only for development/debugging.
  grpc_reflection: false

# ── Auto-Response (OSS) ───────────────────────────────────────────
# Automatic block/throttle on high-severity alerts.
# Max 3 policies in OSS. Enterprise adds unlimited policies, MITRE
# tactic matching, SOAR webhooks, cooldowns, and full audit trail.
# auto_response:
#   enabled: true
#   policies:
#     - name: block-critical
#       min_severity: critical    # low, medium, high, critical
#       action: block             # block or throttle
#       ttl_secs: 3600            # 1 hour
#     - name: block-ids-ddos-high
#       min_severity: high
#       components: [ids, ddos]   # optional filter (empty = all components)
#       action: block
#       ttl_secs: 1800

# ── Auto-Capture (OSS) ────────────────────────────────────────────
# Start a PCAP capture when a high-severity alert fires.
# 1 capture at a time, max 60s duration. Enterprise adds ring buffer,
# multi-capture, flow timeline, and forensics API.
# auto_capture:
#   enabled: true
#   min_severity: high           # low, medium, high, critical
#   components: []               # empty = all components
#   duration_secs: 30            # max 60s in OSS
#   snap_length: 1500
#   interface: eth0              # default: first agent interface

# ── Interface Groups ──────────────────────────────────────────────
# Named groups of interfaces for multi-interface rule scoping.
# Rules can target specific groups via the `interfaces` field.
# Use "!" prefix to invert (e.g., "!lan" = all except lan).
# interface_groups:
#   lan:
#     interfaces: [eth0, eth1]
#   wan:
#     interfaces: [eth2]
#   dmz:
#     interfaces: [eth3]

firewall:
  enabled: true

ids:
  enabled: true

ips:
  enabled: true

dlp:
  enabled: true

ratelimit:
  enabled: true

threatintel:
  enabled: true

dns:
  enabled: true

alerting:
  enabled: false

audit:
  enabled: false

# Authentication. When disabled, /metrics is unauthenticated — rely on
# network isolation (K8s NetworkPolicy, firewall rules) to restrict access.
# When enabled, /metrics requires a token by default (metrics_auth_required).
auth:
  enabled: false
  # JWT verification path. Two modes:
  #   - static PEM   (algorithm: RS256 + public_key_path)
  #   - JWKS          (algorithm: EdDSA + jwks_url) — required by the
  #                   dashboard's short-lived per-tenant tokens with key
  #                   rotation.
  jwt:
    # algorithm: RS256       # RS256 (default) or EdDSA
    # public_key_path: ""    # PEM path; mutually exclusive with jwks_url
    # jwks_url: ""           # https://dashboard/.well-known/jwks.json
    # jwks_cache_ttl_seconds: 3600
    # jwks_refresh_on_unknown_kid: true

conntrack:
  enabled: false

ddos:
  enabled: false

l7:
  enabled: false

nat:
  enabled: false

routing:
  enabled: false

loadbalancer:
  enabled: false

# GeoIP is disabled by default: leave the whole block commented out.
# Unlike other sections it has no standalone on/off — enabling it requires a
# `source` (maxmind_account / url / file). See config/examples/geoip.yaml.
# geoip:
#   enabled: true
#   source:
#     mode: file
#     city_path: /var/lib/ebpfsentinel/geoip/GeoLite2-City.mmdb

zones:
  enabled: false

qos:
  enabled: false

# Management metadata exposed via `GET /api/v1/agent/identity`. The
# dashboard reads these values to lock its config-edit UI on agents
# whose configuration is owned by the Kubernetes operator (CRD-driven)
# and to deep-link to the operator's own UI.
#
# Both fields are hot-reloadable; toggling them at runtime takes effect
# on the next request without restart.
management:
  # operator_managed: false
  # operator_endpoint: https://operator.example.com

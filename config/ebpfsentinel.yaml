# eBPFsentinel — Default Configuration
#
# Adapt `agent.interfaces` to your host network interface(s).
# See config/ebpfsentinel.example.yaml for all available options.

agent:
  # Network interfaces to attach eBPF programs to (REQUIRED).
  # Change to match your host: ip -o link show | awk -F': ' '{print $2}'
  interfaces: [eth0]

  # IP address to bind HTTP/gRPC/metrics listeners to.
  # Use "0.0.0.0" to listen on all interfaces, "127.0.0.1" for localhost only.
  # Note: with Docker network_mode: host, this controls the actual host bind
  # address — "127.0.0.1" means only local access, even in a container.
  bind_address: "127.0.0.1"

  # Serve the Swagger UI at /swagger-ui (useful for development/debugging).
  swagger_ui: false

  # XDP attachment mode: auto, native, generic, or offloaded.
  # auto (default): kernel picks best available (native → generic fallback).
  # native: driver-mode XDP (fastest, requires driver support — e.g. virtio_net, mlx5, i40e).
  # generic: SKB-mode XDP (universal but slower — packets allocated as sk_buff first).
  # offloaded: hardware offload to SmartNIC (requires NIC support — e.g. Netronome NFP).
  # If the requested mode is unsupported, falls back to auto with a warning.
  xdp_mode: auto

  log_level: info
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

  # TLS for HTTP and gRPC listeners. Disabled by default (plaintext).
  # tls:
  #   enabled: true
  #   cert_path: /etc/ebpfsentinel/tls/tls.crt
  #   key_path: /etc/ebpfsentinel/tls/tls.key
  #   pq_mode: prefer        # prefer | require | disable (post-quantum hybrid X25519MLKEM768)
  #   allow_tls12: false      # default: TLS 1.3 only. Set true for legacy clients.

  # gRPC reflection — disabled by default (prevents unauthenticated API schema enumeration).
  # Enable only for development/debugging.
  grpc_reflection: false

# ── Auto-Response (OSS) ───────────────────────────────────────────
# Automatic block/throttle on high-severity alerts.
# Max 3 policies in OSS. Enterprise adds unlimited policies, MITRE
# tactic matching, SOAR webhooks, cooldowns, and full audit trail.
# auto_response:
#   enabled: true
#   policies:
#     - name: block-critical
#       min_severity: critical    # low, medium, high, critical
#       action: block             # block or throttle
#       ttl_secs: 3600            # 1 hour
#     - name: block-ids-ddos-high
#       min_severity: high
#       components: [ids, ddos]   # optional filter (empty = all components)
#       action: block
#       ttl_secs: 1800

# ── Auto-Capture (OSS) ────────────────────────────────────────────
# Start a PCAP capture when a high-severity alert fires.
# 1 capture at a time, max 60s duration. Enterprise adds ring buffer,
# multi-capture, flow timeline, and forensics API.
# auto_capture:
#   enabled: true
#   min_severity: high           # low, medium, high, critical
#   components: []               # empty = all components
#   duration_secs: 30            # max 60s in OSS
#   snap_length: 1500
#   interface: eth0              # default: first agent interface

# ── Interface Groups ──────────────────────────────────────────────
# Named groups of interfaces for multi-interface rule scoping.
# Rules can target specific groups via the `interfaces` field.
# Use "!" prefix to invert (e.g., "!lan" = all except lan).
# interface_groups:
#   lan:
#     interfaces: [eth0, eth1]
#   wan:
#     interfaces: [eth2]
#   dmz:
#     interfaces: [eth3]

firewall:
  enabled: true

ids:
  enabled: true

ips:
  enabled: true

dlp:
  enabled: true

ratelimit:
  enabled: true

threatintel:
  enabled: true

dns:
  enabled: true

alerting:
  enabled: false

audit:
  enabled: false

auth:
  enabled: false

conntrack:
  enabled: false

ddos:
  enabled: false

l7:
  enabled: false

nat:
  enabled: false

routing:
  enabled: false

loadbalancer:
  enabled: false

geoip:
  enabled: false

zones:
  enabled: false

qos:
  enabled: false

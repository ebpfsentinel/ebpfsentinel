# eBPFsentinel — Connection Tracking Configuration Example
# ========================================================
#
# Connection tracking probes kernel netfilter via bpf_skb_ct_lookup
# (TC) and bpf_xdp_ct_lookup (XDP) kfuncs. The kernel manages all
# TCP/UDP/ICMP state, timeouts, and eviction — no BPF-side shadow
# tables or state machine.
#
# Architecture:
#   - tc-conntrack (TC ingress): probes kernel netfilter CT for each
#     packet, reads nf_conn->status and nf_conn->mark via
#     bpf_probe_read_kernel at runtime BTF-resolved offsets.
#   - xdp-firewall (XDP): uses bpf_xdp_ct_lookup for fast-path
#     bypass — ESTABLISHED/RELATED packets skip rule evaluation.
#   - Userspace: parses /proc/net/nf_conntrack for the REST API
#     and SSE event stream.
#
# Shared maps (pinned to /sys/fs/bpf/ebpfsentinel/):
#   ct_config         (Array, 1 entry — thresholds + enabled flag)
#   ct_nf_conn_offsets (Array, 1 entry — runtime BTF offsets)
#
# Kernel-side timeouts are managed by netfilter (sysctl):
#   net.netfilter.nf_conntrack_tcp_timeout_established = 432000
#   net.netfilter.nf_conntrack_tcp_timeout_syn_sent = 120
#   net.netfilter.nf_conntrack_udp_timeout = 30
#   net.netfilter.nf_conntrack_icmp_timeout = 30
#
# Usage:
#   sudo ebpfsentinel-agent --config config/examples/conntrack.yaml

agent:
  interfaces: [eth0]

# ── Connection Tracking ────────────────────────────────────────────

conntrack:
  enabled: true

  # Flood detection thresholds (alert when exceeded).
  # These are BPF-side counters — kernel netfilter handles actual CT.
  half_open_threshold: 128
  rst_threshold: 50
  fin_threshold: 50
  ack_threshold: 100

# ── Firewall (stateful rules using conntrack) ──────────────────────
#
# With conntrack enabled, firewall rules can use the `state` field
# to filter by connection state: new, established, related, invalid.
# State is resolved from kernel netfilter via kfunc lookup.

firewall:
  enabled: true
  mode: block
  default_policy: drop

  rules:
    # Fast-path: ESTABLISHED/RELATED are handled by XDP Phase 0
    # (bpf_xdp_ct_lookup) before rule evaluation — this rule is a
    # safety net for edge cases where the kfunc returns no match.
    - id: fw-allow-established
      priority: 1
      action: allow
      state: [established, related]

    # Drop invalid connections (IPS_DYING in kernel CT).
    - id: fw-drop-invalid
      priority: 2
      action: deny
      state: [invalid]

    # Allow new inbound SSH from management subnet.
    - id: fw-allow-ssh
      priority: 10
      action: allow
      protocol: tcp
      src_ip: "192.168.100.0/24"
      dst_port: 22
      state: [new]

    # Allow new inbound HTTPS.
    - id: fw-allow-https
      priority: 20
      action: allow
      protocol: tcp
      dst_port: 443
      state: [new]

    # Allow new outbound DNS.
    - id: fw-allow-dns-udp
      priority: 30
      action: allow
      protocol: udp
      dst_port: 53
      state: [new]

    - id: fw-allow-dns-tcp
      priority: 31
      action: allow
      protocol: tcp
      dst_port: 53
      state: [new]

    # Log ICMP for diagnostics.
    - id: fw-log-icmp
      priority: 100
      action: log
      protocol: icmp

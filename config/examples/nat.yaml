# eBPFsentinel — NAT Configuration Example
# =========================================
#
# Network Address Translation via TC classifiers with conntrack integration.
# Supports SNAT, DNAT, masquerade, 1:1 NAT, port forwarding, and redirect.
# Full IPv4/IPv6 dual-stack support.
#
# Architecture:
#   INGRESS: packet → XDP (firewall) → TC (tc-conntrack) → TC (tc-nat-ingress: DNAT)
#   EGRESS:  app → TC (tc-nat-egress: SNAT/masquerade) → wire
#
# NAT entries are cached in the conntrack table. After the first packet of a
# connection matches a NAT rule, subsequent packets use the cached translation
# (CT_FLAG_NAT_SRC / CT_FLAG_NAT_DST flags). Reverse-direction packets are
# automatically un-NATed using the conntrack mapping.
#
# Packet rewriting uses:
#   - bpf_skb_store_bytes    — overwrite IP/port fields
#   - bpf_l3_csum_replace    — incremental IP header checksum update (IPv4 only)
#   - bpf_l4_csum_replace    — incremental TCP/UDP pseudo-header checksum update (IPv4/IPv6)
#
# Port allocation for SNAT/masquerade uses a hash-based scheme over an
# LRU HashMap (65536 entries), ensuring even distribution across the
# configured port range.
#
# Prerequisites:
#   - Connection tracking must be enabled (conntrack.enabled: true)
#   - Firewall should allow the translated traffic
#
# Usage:
#   sudo ebpfsentinel-agent --config config/examples/nat.yaml
#
# Full reference: config/ebpfsentinel.example.yaml

agent:
  interfaces: [eth0, eth1, eth2, eth3]

# ── Interface Groups ──────────────────────────────────────────────

interface_groups:
  lan:
    interfaces: [eth0, eth1]
  wan:
    interfaces: [eth2]
  dmz:
    interfaces: [eth3]

# ── Top-level Aliases (shared across all domains) ────────────────────

aliases:
  lan_networks:
    type: ip_set
    values: ["192.168.0.0/16", "10.0.0.0/8"]

  web_servers:
    type: ip_set
    values: ["10.0.1.10", "10.0.1.11", "10.0.1.12"]

# ── Connection tracking (required for NAT) ─────────────────────────

conntrack:
  enabled: true
  half_open_threshold: 128
  rst_threshold: 50
  fin_threshold: 50
  ack_threshold: 100

# ── NAT ────────────────────────────────────────────────────────────

nat:
  enabled: true

  # ── SNAT rules (tc-nat-egress) ─────────────────────────────────
  #
  # Applied on egress: rewrite the source address/port of outgoing packets.
  #
  # Fields:
  #   id              — Unique rule identifier
  #   type            — "snat", "masquerade", or "one_to_one"
  #   match_src       — Source CIDR to match (packets from this network)
  #   match_dst       — Destination CIDR to match (optional)
  #   match_protocol  — "tcp", "udp", or "any" (optional, default: any)
  #   translated_addr — New source IP (SNAT only)
  #   interface       — Outgoing interface for masquerade (uses its IP)
  #   port_range      — Ephemeral port range for SNAT/masquerade
  #   external_addr   — External IP (1:1 NAT)
  #   internal_addr   — Internal IP (1:1 NAT)

  snat_rules:
    # Masquerade: rewrite source to the IP of eth0 for LAN traffic.
    # This is the most common NAT setup for internet access from a private LAN.
    - id: nat-masq-lan
      type: masquerade
      interface: eth0
      match_src: "192.168.0.0/16"
      port_range: "10000-60000"

    # Static SNAT: rewrite source to a specific public IP.
    # Useful when the outgoing interface has multiple IPs or a fixed
    # public address is required for auditing/whitelisting.
    - id: nat-snat-servers
      type: snat
      translated_addr: "203.0.113.1"
      match_src: "10.0.1.0/24"
      port_range: "32768-60999"

    # 1:1 NAT for a DMZ server: bidirectional static mapping.
    # External 203.0.113.50 ↔ Internal 10.0.2.50
    - id: nat-1to1-dmz
      type: one_to_one
      external_addr: "203.0.113.50"
      internal_addr: "10.0.2.50"

    # Masquerade using alias: match source from named alias group
    - id: nat-masq-alias
      type: masquerade
      interface: eth0
      match_src_alias: lan_networks
      port_range: "10000-60000"

    # IPv6 SNAT: rewrite source to a specific IPv6 address for ULA traffic.
    # IPv6 rules use the same snat_rules list — address family is auto-detected.
    - id: nat-snat-ula
      type: snat
      translated_addr: "2001:db8:1::1"
      match_src: "fd00::/8"
      port_range: "32768-60999"

  # ── DNAT rules (tc-nat-ingress) ────────────────────────────────
  #
  # Applied on ingress: rewrite the destination address/port of incoming packets.
  #
  # Fields:
  #   id              — Unique rule identifier
  #   type            — "dnat", "redirect", or "port_forward"
  #   match_dst       — Destination CIDR to match (optional)
  #   match_dst_port  — Destination port or range to match
  #   match_protocol  — "tcp", "udp", or "any" (optional, default: any)
  #   translated_addr — New destination IP
  #   translated_port — New destination port

  dnat_rules:
    # Port forwarding: redirect public port 8080 to internal web server port 80.
    - id: nat-pf-web
      type: dnat
      translated_addr: "10.0.1.10"
      translated_port: 80
      match_dst_port: 8080
      match_protocol: tcp
      interfaces: [wan]           # Apply only to the "wan" interface group (optional, default: all)

    # Port forwarding: redirect public port 2222 to SSH on a jump host.
    - id: nat-pf-ssh
      type: dnat
      translated_addr: "10.0.1.20"
      translated_port: 22
      match_dst_port: 2222
      match_protocol: tcp

    # Redirect: send all DNS traffic arriving on this host to a local resolver.
    # Unlike DNAT, redirect keeps the same interface — only the port changes.
    - id: nat-redirect-dns
      type: redirect
      translated_port: 5353
      match_dst_port: 53
      match_protocol: udp

    # Port forward: map an external port range to an internal server and port range.
    # Unlike DNAT, port_forward uses ext_port/int_port for range-to-range mapping
    # (e.g. external 3000-3010 → internal 8000-8010 on the target server).
    - id: nat-pf-app-range
      type: port_forward
      ext_port: "3000-3010"
      internal_addr: "10.0.1.30"
      int_port: "8000-8010"
      match_protocol: tcp

    # DNAT using alias: forward traffic destined to web_servers alias
    - id: nat-dnat-alias
      type: dnat
      translated_addr: "10.0.1.10"
      translated_port: 80
      match_dst_alias: web_servers
      match_dst_port: 8080
      match_protocol: tcp

    # IPv6 DNAT: redirect public port 8080 to an internal IPv6 web server.
    # IPv6 rules use the same dnat_rules list — address family is auto-detected.
    - id: nat-pf-web-v6
      type: dnat
      translated_addr: "fd00::10"
      translated_port: 80
      match_dst_port: 8080
      match_protocol: tcp

  # Hairpin NAT (NAT reflection) — allows internal clients to access
  # internal services via the external IP. The firewall applies DNAT +
  # SNAT so return traffic routes back through tc-nat-ingress.
  hairpin:
    enabled: true
    internal_subnet: "192.168.1.0/24"
    hairpin_snat_ip: "192.168.1.1"

  # ── NPTv6 (RFC 6296) prefix translation ─────────────────────────
  #
  # Stateless, bidirectional IPv6-to-IPv6 prefix mapping.
  # Ingress: rewrites destination (external -> internal).
  # Egress:  rewrites source (internal -> external).
  #
  # Unlike SNAT/DNAT, NPTv6 does not use conntrack — it is fully
  # stateless and rewrites only the prefix portion of the IPv6 address,
  # adjusting a single IID word for checksum neutrality (RFC 6296 §3.1).
  #
  # Fields:
  #   id              — Unique rule identifier
  #   enabled         — Whether this rule is active (default: true)
  #   internal_prefix — Site-local IPv6 prefix (e.g. ULA)
  #   external_prefix — Provider-assigned or globally-routable prefix
  #   prefix_len      — Length of the prefix in bits (1-64)

  nptv6_rules:
    # Map ULA site prefix fd00:1::/48 to provider prefix 2001:db8:1::/48
    - id: nptv6-site1
      enabled: true
      internal_prefix: "fd00:1::"
      external_prefix: "2001:db8:1::"
      prefix_len: 48

    # Map a second ULA site to a different provider block
    - id: nptv6-site2
      enabled: true
      internal_prefix: "fd00:2::"
      external_prefix: "2001:db8:2::"
      prefix_len: 48

# ── Firewall (allow NATed traffic) ─────────────────────────────────

firewall:
  enabled: true
  mode: block
  default_policy: drop

  rules:
    - id: fw-allow-established
      priority: 1
      action: allow
      state: [established, related]

    - id: fw-drop-invalid
      priority: 2
      action: deny
      state: [invalid]

    # Allow new inbound traffic to port-forwarded services
    - id: fw-allow-web-pf
      priority: 10
      action: allow
      protocol: tcp
      dst_ip: "10.0.1.10"
      dst_port: 80
      state: [new]

    - id: fw-allow-ssh-pf
      priority: 11
      action: allow
      protocol: tcp
      dst_ip: "10.0.1.20"
      dst_port: 22
      state: [new]

    # Allow outbound from LAN (will be masqueraded)
    - id: fw-allow-lan-outbound
      priority: 20
      action: allow
      src_ip: "192.168.0.0/16"
      state: [new]

    # Allow inbound IPv6 traffic to port-forwarded web server
    - id: fw-allow-web-pf-v6
      priority: 12
      action: allow
      protocol: tcp
      dst_ip: "fd00::10"
      dst_port: 80
      state: [new]

    # Allow outbound from ULA network (will be SNATed)
    - id: fw-allow-ula-outbound
      priority: 21
      action: allow
      src_ip: "fd00::/8"
      state: [new]

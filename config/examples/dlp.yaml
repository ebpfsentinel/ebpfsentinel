# eBPFsentinel — Data Loss Prevention (DLP) Configuration Example
# ===============================================================
#
# Userspace DLP engine inspects TLS-decrypted payloads (via uprobe on
# SSL_write/SSL_read) for sensitive data patterns. Each pattern has a
# regex, severity, data type classification, and optional per-pattern
# mode override.
#
# Usage:
#   sudo ebpfsentinel-agent --config config/examples/dlp.yaml
#
# Full reference: config/ebpfsentinel.example.yaml

agent:
  interfaces: [eth0]

dlp:
  enabled: true

  # Mode. OSS supports "alert" only (log matches, observe). "block" / "enforce"
  # (actively cut connections leaking sensitive data) is an Enterprise feature
  # and is rejected by the OSS config validator.
  mode: alert

  # ── Built-in patterns (OSS) ────────────────────────────────────────
  #
  # OSS ships a FIXED set of nine built-in patterns. They are always loaded in
  # alert mode whenever `dlp.enabled: true` — there is nothing to declare here.
  # Inspect the active set at runtime: GET /api/v1/dlp/patterns.
  #
  #   PCI:         dlp-pci-visa, dlp-pci-mastercard, dlp-pci-amex
  #   PII:         dlp-pii-email, dlp-pii-ssn
  #   Credentials: dlp-cred-aws-key, dlp-cred-github-token,
  #                dlp-cred-password, dlp-cred-bearer
  #
  # The OSS validator accepts a `patterns:` list only for built-in IDs
  # (prefixes dlp-pci-*, dlp-pii-*, dlp-cred-*) in alert mode, but the engine
  # always runs the built-in definitions — listing them here has no effect.

  # ── Custom patterns — ENTERPRISE ───────────────────────────────────
  #
  # Defining your own regex patterns (any non-built-in ID), per-pattern mode
  # overrides, and block/enforce enforcement require an Enterprise license.
  # The block below is rejected by the OSS validator; shown for reference only.
  #
  # patterns:
  #   - id: corp-employee-id
  #     name: Internal Employee ID
  #     regex: "\\bEMP-[0-9]{6}\\b"
  #     severity: medium
  #     data_type: internal
  #     mode: block
  #     description: "Internal employee identifier (EMP-XXXXXX)"
  #     enabled: true

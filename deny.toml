# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
#
# eBPF programs (crates/ebpf-programs/*) are excluded from the workspace
# and therefore not checked by cargo deny. They require unsafe by nature
# (raw memory access, BPF helpers).

[graph]
all-features = true

[advisories]
# Unmaintained crates: warn only for direct workspace dependencies
unmaintained = "workspace"
ignore = []

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "AGPL-3.0-only",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "OpenSSL",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []

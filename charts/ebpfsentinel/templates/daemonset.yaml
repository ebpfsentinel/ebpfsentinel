apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ebpfsentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ebpfsentinel.labels" . | nindent 4 }}
  {{- with (include "ebpfsentinel.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ebpfsentinel.selectorLabels" . | nindent 6 }}
  {{- with .Values.daemonset.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  minReadySeconds: {{ .Values.daemonset.minReadySeconds }}
  revisionHistoryLimit: {{ .Values.daemonset.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        {{- include "ebpfsentinel.selectorLabels" . | nindent 8 }}
        {{- with .Values.daemonset.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.agent.metricsPort | quote }}
        {{- with .Values.daemonset.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostNetwork: true
      hostPID: {{ .Values.daemonset.hostPID }}
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "ebpfsentinel.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- if .Values.daemonset.brokerSidecar.enabled }}
      securityContext:
        # The agent runs as this fsGroup so it can read the 0640 configMap
        # (group-owned) without the file being world-readable.
        fsGroup: {{ .Values.daemonset.brokerSidecar.agentUid }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.daemonset.priorityClassName }}
      priorityClassName: {{ .Values.daemonset.priorityClassName | quote }}
      {{- end }}
      {{- with .Values.daemonset.initContainers }}
      initContainers:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        {{- if .Values.daemonset.brokerSidecar.enabled }}
        # Privileged broker — the only full-access component. Delegates the
        # bpffs + hands the agent the module-BTF/pcap fds over the shared socket.
        - name: broker
          image: {{ include "ebpfsentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.daemonset.brokerSidecar.brokerSecurityContext | nindent 12 }}
          command:
            - "/usr/local/bin/ebpfsentinel-token-launch"
            - "--broker-serve"
            - {{ .Values.daemonset.brokerSidecar.socketPath | quote }}
          {{- with .Values.daemonset.brokerSidecar.brokerResources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: broker-sock
              mountPath: {{ dir .Values.daemonset.brokerSidecar.socketPath | quote }}
        {{- end }}
        - name: agent
          image: {{ include "ebpfsentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- if .Values.daemonset.brokerSidecar.enabled }}
            {{- toYaml .Values.daemonset.brokerSidecar.agentSecurityContext | nindent 12 }}
            {{- else }}
            {{- toYaml .Values.daemonset.securityContext | nindent 12 }}
            {{- end }}
          # Override the image entrypoint so the launcher --bpffs tracks the
          # configured bpffsPath (the agent's bpf_token.bpffs_path must match).
          command:
            - "/usr/local/bin/ebpfsentinel-token-launch"
            {{- if .Values.daemonset.brokerSidecar.enabled }}
            - "--broker-connect"
            - {{ .Values.daemonset.brokerSidecar.socketPath | quote }}
            {{- end }}
            - "--bpffs"
            - {{ .Values.daemonset.bpfToken.bpffsPath | quote }}
            - "/usr/local/bin/ebpfsentinel-agent"
          args:
            - "--config"
            - "/etc/ebpfsentinel/config.yaml"
          ports:
            - containerPort: {{ .Values.agent.httpPort }}
              name: http
              protocol: TCP
            - containerPort: {{ .Values.agent.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.agent.metricsPort }}
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          {{- with .Values.daemonset.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.daemonset.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            {{- if .Values.daemonset.brokerSidecar.enabled }}
            - name: broker-sock
              mountPath: {{ dir .Values.daemonset.brokerSidecar.socketPath | quote }}
            - name: bpf
              # In split mode /sys is read-only and the bpffs is a fresh delegated
              # mount, so this is an in-pod tmpfs (mountpoint + pinned maps).
              mountPath: /sys/fs/bpf
            {{- else }}
            - name: bpf
              mountPath: /sys/fs/bpf
              {{- if not .Values.daemonset.bpfToken.bpffsEmptyDir }}
              # The launcher mounts the delegated bpffs over this path inside its
              # own private mount namespace; expose the host bpffs to the pod.
              # (Omitted for an in-pod tmpfs, where there is no host bpffs.)
              mountPropagation: HostToContainer
              {{- end }}
            {{- end }}
            - name: debug
              mountPath: /sys/kernel/debug
              readOnly: true
            {{- with .Values.daemonset.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.daemonset.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.daemonset.terminationGracePeriodSeconds }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ebpfsentinel.fullname" . }}-config
            # The agent rejects a world-readable config; configMap volumes
            # default to 0644, so pin a stricter mode.
            defaultMode: 0640
        - name: bpf
          {{- if or .Values.daemonset.brokerSidecar.enabled .Values.daemonset.bpfToken.bpffsEmptyDir }}
          # Split mode, or bpfToken.bpffsEmptyDir on a nested runtime (kind,
          # minikube): the bpffs is a fresh delegated/in-pod mount, so an in-pod
          # tmpfs gives the writable mountpoint (a container's /sys is read-only).
          emptyDir:
            medium: Memory
          {{- else }}
          # A container's /sys is read-only, so the launcher needs this writable
          # host bpffs to create the delegated mountpoint. On nested runtimes
          # (kind, minikube) whose /sys/fs/bpf is read-only or absent, set
          # daemonset.bpfToken.bpffsEmptyDir=true to use an in-pod tmpfs instead.
          hostPath:
            path: /sys/fs/bpf
          {{- end }}
        {{- if .Values.daemonset.brokerSidecar.enabled }}
        - name: broker-sock
          emptyDir: {}
        {{- end }}
        - name: debug
          hostPath:
            path: /sys/kernel/debug
        {{- with .Values.daemonset.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "ebpfsentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ebpfsentinel.labels" . | nindent 4 }}
  {{- with (include "ebpfsentinel.annotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "ebpfsentinel.selectorLabels" . | nindent 6 }}
  {{- with .Values.daemonset.updateStrategy }}
  updateStrategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  minReadySeconds: {{ .Values.daemonset.minReadySeconds }}
  revisionHistoryLimit: {{ .Values.daemonset.revisionHistoryLimit }}
  template:
    metadata:
      labels:
        {{- include "ebpfsentinel.selectorLabels" . | nindent 8 }}
        {{- with .Values.daemonset.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- with .Values.commonLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.agent.metricsPort | quote }}
        {{- with .Values.daemonset.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      hostNetwork: true
      hostPID: {{ .Values.daemonset.hostPID }}
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: {{ include "ebpfsentinel.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        # The agent drops to uid/gid 65534 before self-mapping its user namespace
        # (it cannot map namespace-0 to real root under a stock container
        # runtime), so it runs as host gid 65534. This fsGroup makes the 0640
        # configMap group-readable by it.
        fsGroup: 65534
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.daemonset.priorityClassName }}
      priorityClassName: {{ .Values.daemonset.priorityClassName | quote }}
      {{- end }}
      # The warden runs as a NATIVE SIDECAR (init container with
      # restartPolicy: Always, Kubernetes 1.28+): it starts before the agent and
      # runs for the pod's life, holding the host capabilities and brokering
      # kernel ops over the shared socket. The agent loads its own eBPF.
      initContainers:
        - name: warden
          image: {{ include "ebpfsentinel.wardenImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          restartPolicy: Always
          securityContext:
            {{- toYaml .Values.daemonset.warden.securityContext | nindent 12 }}
          args:
            - "serve"
            - "/run/ebpfsentinel/warden.sock"
            - "--uid"
            - "65534" # only the agent's uid is served (SO_PEERCRED gate)
          {{- with .Values.daemonset.warden.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: warden-sock
              mountPath: /run/ebpfsentinel
        {{- with .Values.daemonset.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: agent
          image: {{ include "ebpfsentinel.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.daemonset.securityContext | nindent 12 }}
          # The agent connects to the warden sidecar over the shared socket, then
          # self-unshares a user namespace and loads its own eBPF. It mounts the
          # delegated bpffs at EBPFSENTINEL_BPFFS (set below to bpffsPath; its
          # bpf_token.bpffs_path config must match).
          args:
            - "--config"
            - "/etc/ebpfsentinel/config.yaml"
          env:
            - name: EBPFSENTINEL_WARDEN_SOCK
              value: /run/ebpfsentinel/warden.sock
            - name: EBPFSENTINEL_BPFFS
              value: {{ .Values.daemonset.bpfToken.bpffsPath | quote }}
            {{- with .Values.daemonset.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: {{ .Values.agent.httpPort }}
              name: http
              protocol: TCP
            - containerPort: {{ .Values.agent.grpcPort }}
              name: grpc
              protocol: TCP
            - containerPort: {{ .Values.agent.metricsPort }}
              name: metrics
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          {{- with .Values.daemonset.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: warden-sock
              mountPath: /run/ebpfsentinel
              readOnly: true
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            - name: bpf
              mountPath: /sys/fs/bpf
              {{- if not .Values.daemonset.bpfToken.bpffsEmptyDir }}
              # The agent mounts the delegated bpffs over this path inside its
              # own private mount namespace; expose the host bpffs to the pod.
              # (Omitted for an in-pod tmpfs, where there is no host bpffs.)
              mountPropagation: HostToContainer
              {{- end }}
            - name: debug
              mountPath: /sys/kernel/debug
              readOnly: true
            {{- with .Values.daemonset.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.daemonset.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      terminationGracePeriodSeconds: {{ .Values.daemonset.terminationGracePeriodSeconds }}
      volumes:
        - name: warden-sock
          emptyDir: {}
        - name: config
          configMap:
            name: {{ include "ebpfsentinel.fullname" . }}-config
            # The agent rejects a world-readable config; configMap volumes
            # default to 0644, so pin a stricter mode.
            defaultMode: 0640
        - name: bpf
          {{- if .Values.daemonset.bpfToken.bpffsEmptyDir }}
          # bpfToken.bpffsEmptyDir on a nested runtime (kind, minikube): the bpffs
          # is a fresh in-pod mount, so an in-pod tmpfs gives the writable
          # mountpoint (a container's /sys is read-only).
          emptyDir:
            medium: Memory
          {{- else }}
          # A container's /sys is read-only, so the agent needs this writable
          # host bpffs to create the delegated mountpoint. On nested runtimes
          # (kind, minikube) whose /sys/fs/bpf is read-only or absent, set
          # daemonset.bpfToken.bpffsEmptyDir=true to use an in-pod tmpfs instead.
          hostPath:
            path: /sys/fs/bpf
          {{- end }}
        - name: debug
          hostPath:
            path: /sys/kernel/debug
        {{- with .Values.daemonset.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.daemonset.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.daemonset.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

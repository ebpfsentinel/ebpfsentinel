{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "ebpfsentinel.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ebpfsentinel.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "ebpfsentinel.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow API, gRPC, and metrics traffic
    - ports:
        - protocol: TCP
          port: {{ .Values.agent.httpPort }}
        - protocol: TCP
          port: {{ .Values.agent.grpcPort }}
        - protocol: TCP
          port: {{ .Values.agent.metricsPort }}
    {{- with .Values.networkPolicy.extraIngress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  egress:
    # Allow DNS resolution
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow responses to any established connection (eBPF agent is passive)
    - {}
    {{- with .Values.networkPolicy.extraEgress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}

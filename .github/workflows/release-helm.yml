name: Release Helm Chart

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.push.outputs.image }}
      digest: ${{ steps.push.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Convert repository owner to lowercase
        id: lowercase
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=${OWNER_LOWER}" >> "$GITHUB_OUTPUT"

      - name: Resolve version from latest git tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-dev")
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION} (from tag: ${TAG})"

      - name: Stamp version in Chart.yaml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version: .*/version: ${VERSION}/" charts/ebpfsentinel/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/ebpfsentinel/Chart.yaml
          echo "Chart.yaml after stamp:"
          grep -E '^(version|appVersion):' charts/ebpfsentinel/Chart.yaml

      - name: Lint chart
        run: helm lint charts/ebpfsentinel/

      - name: Login to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Package Helm chart
        run: helm package charts/ebpfsentinel/

      - name: Push Helm chart to GHCR
        id: push
        run: |
          helm push "ebpfsentinel-${{ steps.version.outputs.version }}.tgz" \
            "oci://ghcr.io/${{ steps.lowercase.outputs.owner }}/charts" 2>&1 | tee push.log
          DIGEST="$(grep -oiE 'sha256:[0-9a-f]{64}' push.log | head -1)"
          if [ -z "$DIGEST" ]; then
            echo "::error::could not parse pushed chart digest from helm output"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${{ steps.lowercase.outputs.owner }}/charts/ebpfsentinel" >> "$GITHUB_OUTPUT"

  # cosign keyless signature of the pushed OCI chart artifact (no SBOM —
  # syft does not produce a meaningful SBOM for a Helm chart).
  sign:
    name: Sign chart
    needs: release
    permissions:
      id-token: write
      packages: write
      contents: read
    uses: ebpfsentinel/ebpfsentinel-release/.github/workflows/sign-image.yml@v1
    with:
      image: ${{ needs.release.outputs.image }}
      digest: ${{ needs.release.outputs.digest }}
      sbom: false

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build release artifacts (multi-arch) ──────────────────────────
  build-release:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            musl_pkg: musl-tools
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            musl_pkg: musl-tools
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.arch }}
          workspaces: |
            .
            crates/ebpf-programs/xdp-firewall
            crates/ebpf-programs/xdp-ratelimit
            crates/ebpf-programs/xdp-loadbalancer
            crates/ebpf-programs/tc-ids
            crates/ebpf-programs/tc-threatintel
            crates/ebpf-programs/tc-dns
            crates/ebpf-programs/tc-conntrack
            crates/ebpf-programs/tc-nat-ingress
            crates/ebpf-programs/tc-nat-egress
            crates/ebpf-programs/tc-scrub
            crates/ebpf-programs/tc-qos
            crates/ebpf-programs/uprobe-dlp

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler ${{ matrix.musl_pkg }} llvm-dev

      - name: Install bpf-linker
        run: |
          if ! command -v llvm-config &>/dev/null; then
            LLC=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)
            [ -n "$LLC" ] && sudo ln -sf "$LLC" /usr/bin/llvm-config
          fi
          llvm-config --version
          cargo +nightly install bpf-linker
          bpf-linker --version

      - name: Stamp version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "Stamping version: ${VERSION}"
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-common/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-helpers/Cargo.toml
          for prog in xdp-firewall xdp-ratelimit xdp-loadbalancer \
                      tc-conntrack tc-nat-ingress tc-nat-egress \
                      tc-ids tc-threatintel tc-dns tc-scrub tc-qos \
                      uprobe-dlp; do
            sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" "crates/ebpf-programs/${prog}/Cargo.toml"
          done

      - name: Build eBPF programs
        run: cargo xtask ebpf-build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ebpfsentinel-agent

      - name: Create release tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="ebpfsentinel-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "${STAGING}/ebpf"
          cp "target/${{ matrix.target }}/release/ebpfsentinel-agent" "${STAGING}/"
          cp config/ebpfsentinel.yaml "${STAGING}/"
          cp dist/ebpfsentinel.service "${STAGING}/"
          cp dist/install.sh "${STAGING}/"
          cp LICENSE "${STAGING}/" 2>/dev/null || true
          cp CHANGELOG.md "${STAGING}/" 2>/dev/null || true
          # eBPF programs are arch-independent (bpfel target)
          for prog in xdp-firewall xdp-ratelimit xdp-loadbalancer \
                      tc-conntrack tc-nat-ingress tc-nat-egress \
                      tc-ids tc-threatintel tc-dns tc-scrub tc-qos \
                      uprobe-dlp; do
            find "crates/ebpf-programs/${prog}/target" -name "${prog}" -type f \
              -path "*/bpfel-unknown-none/release/*" \
              -exec cp {} "${STAGING}/ebpf/" \; 2>/dev/null || true
          done
          tar czf "${STAGING}.tar.gz" "${STAGING}"
          echo "TARBALL=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: ${{ env.TARBALL }}
          retention-days: 5

  # ── Create GitHub Release ──────────────────────────────────────────
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION" '
              /^## / { if (found) exit; if (index($0, ver)) found=1; next }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF_NAME}"
          fi
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "${TAG}" artifacts/*.tar.gz \
            --title "eBPFsentinel ${TAG}" \
            --notes-file release-notes.md

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      force_version:
        description: "Force a specific version (optional, format: YYYY.M.X)"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Prepare: resolve version (no tag creation yet) ────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          elif [ -n "${{ github.event.inputs.force_version }}" ]; then
            VERSION="${{ github.event.inputs.force_version }}"
            if ! echo "$VERSION" | grep -qE '^[0-9]{4}\.[1-9][0-9]?\.[0-9]+$'; then
              echo "::error::Invalid version format: $VERSION (expected YYYY.M.X)"
              exit 1
            fi
          else
            git fetch --tags
            YEAR=$(date +'%Y')
            MONTH=$(date +'%-m')
            LATEST_TAG=$(git tag -l "v${YEAR}.${MONTH}.*" | sort -V | tail -n 1)
            if [ -z "$LATEST_TAG" ]; then
              VERSION="${YEAR}.${MONTH}.1"
            else
              PATCH=$(echo "$LATEST_TAG" | sed "s/^v${YEAR}\.${MONTH}\.\([0-9]*\).*/\1/")
              VERSION="${YEAR}.${MONTH}.$((PATCH + 1))"
            fi
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

  # ── Build release tarballs (multi-arch) ───────────────────────────
  build-release:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-musl
            musl_pkg: musl-tools
          - arch: arm64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            musl_pkg: musl-tools
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.arch }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libpcap-dev ${{ matrix.musl_pkg }} llvm-dev

      - name: Install bpf-linker
        run: |
          if ! command -v llvm-config &>/dev/null; then
            LLC=$(ls /usr/bin/llvm-config-* 2>/dev/null | sort -V | tail -1)
            [ -n "$LLC" ] && sudo ln -sf "$LLC" /usr/bin/llvm-config
          fi
          llvm-config --version
          cargo +nightly install bpf-linker
          bpf-linker --version

      - name: Stamp version
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          find . -name Cargo.toml -exec grep -l '0.0.0-dev' {} + \
            | xargs sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/"

      - name: Build eBPF programs
        run: cargo xtask ebpf-build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin ebpfsentinel-agent

      - name: Create release tarball
        run: |
          STAGING="ebpfsentinel-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "${STAGING}/ebpf"
          cp "target/${{ matrix.target }}/release/ebpfsentinel-agent" "${STAGING}/"
          cp config/ebpfsentinel.yaml "${STAGING}/"
          cp dist/ebpfsentinel.service "${STAGING}/"
          cp dist/install.sh "${STAGING}/"
          cp LICENSE "${STAGING}/" 2>/dev/null || true
          cp CHANGELOG.md "${STAGING}/" 2>/dev/null || true
          find crates/ebpf-programs/*/target/bpfel-unknown-none/release \
            -maxdepth 1 -type f ! -name '*.d' ! -name '*.fingerprint' \
            -exec cp {} "${STAGING}/ebpf/" \; 2>/dev/null || true
          tar czf "${STAGING}.tar.gz" "${STAGING}"
          echo "TARBALL=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: ${{ env.TARBALL }}
          retention-days: 5

  # ── Build Docker images (multi-arch) ──────────────────────────────
  docker:
    name: Docker Image
    needs: prepare
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  # ── Tag + GitHub Release (only after tarballs AND Docker succeed) ──
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: [prepare, build-release, docker]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Created tag: ${TAG}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          if [ -f CHANGELOG.md ]; then
            NOTES=$(awk -v ver="$VERSION" '
              /^## / { if (found) exit; if (index($0, ver)) found=1; next }
              found { print }
            ' CHANGELOG.md)
          fi
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ needs.prepare.outputs.tag }}"
          fi
          echo "$NOTES" > release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare.outputs.tag }}" artifacts/*.tar.gz \
            --title "eBPFsentinel ${{ needs.prepare.outputs.tag }}" \
            --notes-file release-notes.md

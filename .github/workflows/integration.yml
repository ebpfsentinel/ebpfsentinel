name: Integration Tests

on:
  # schedule:
  #   - cron: "0 5 * * 1" # Weekly Monday 05:00 UTC (API + Docker + eBPF)
  #   - cron: "0 4 * * *" # Nightly 04:00 UTC (3-VM transit topology)
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

concurrency:
  group: integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build agent binary and eBPF programs ─────────────────────────
  build:
    name: Build Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-rust-build
        with:
          install-nightly: "true"

      - uses: ./.github/actions/install-bpf-linker

      - name: Build eBPF programs
        run: cargo xtask ebpf-build

      - name: Build agent (release)
        run: cargo build --release --bin ebpfsentinel-agent

      - name: Upload agent binary
        uses: actions/upload-artifact@v4
        with:
          name: ebpfsentinel-agent
          path: target/release/ebpfsentinel-agent
          retention-days: 7

  # ── API integration tests (suites 01-05 + 07) ───────────────────
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download agent binary
        uses: actions/download-artifact@v4
        with:
          name: ebpfsentinel-agent
          path: target/release/

      - name: Make agent executable
        run: chmod +x target/release/ebpfsentinel-agent

      - uses: ./.github/actions/install-bats

      - name: Install grpcurl
        run: |
          GRPCURL_VERSION="1.9.1"
          GRPCURL_SHA256="588c9c429476d9ed66cd3b2ae32283a6da36e0cfbb7e446f5d6a1b68dc770214"
          curl -sSL -o /tmp/grpcurl.tar.gz \
            "https://github.com/fullstorydev/grpcurl/releases/download/v${GRPCURL_VERSION}/grpcurl_${GRPCURL_VERSION}_linux_x86_64.tar.gz"
          echo "${GRPCURL_SHA256}  /tmp/grpcurl.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/grpcurl.tar.gz -C /usr/local/bin grpcurl
          rm -f /tmp/grpcurl.tar.gz

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq openssl

      - name: Generate TLS certificates
        run: bash tests/integration/scripts/generate-certs.sh

      - name: Generate JWT keys and tokens
        run: bash tests/integration/scripts/generate-jwt-keys.sh

      - name: Suite 01 — Agent Lifecycle
        run: bats --timing tests/integration/suites/01-agent-lifecycle.bats

      - name: Suite 02 — REST API Health
        run: bats --timing tests/integration/suites/02-rest-api-health.bats

      - name: Suite 03 — Firewall CRUD
        run: bats --timing tests/integration/suites/03-rest-api-firewall.bats

      - name: Suite 04 — Domain APIs
        run: bats --timing tests/integration/suites/04-rest-api-domains.bats

      - name: Suite 05 — gRPC Streaming
        run: bats --timing tests/integration/suites/05-grpc-streaming.bats

      - name: Suite 07 — Authentication & RBAC
        run: bats --timing tests/integration/suites/07-authentication.bats

      - name: Suite 08 — TLS
        run: bats --timing tests/integration/suites/08-tls.bats

  # ── Docker deployment tests (suite 09) ───────────────────────────
  test-docker:
    name: Docker Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6

      - name: Download agent binary
        uses: actions/download-artifact@v8
        with:
          name: ebpfsentinel-agent
          path: target/release/

      - name: Make agent executable
        run: chmod +x target/release/ebpfsentinel-agent

      - uses: ./.github/actions/install-bats

      - name: Install tools
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Prepare eBPF programs for Docker build
        run: |
          mkdir -p ebpf-out
          find crates/ebpf-programs/*/target/bpfel-unknown-none/release \
            -maxdepth 1 -type f ! -name '*.d' ! -name '*.fingerprint' \
            -exec cp {} ebpf-out/ \; 2>/dev/null || true
          # If no pre-built eBPF programs, create empty dir (Docker build still works)
          ls ebpf-out/ 2>/dev/null || echo "No eBPF programs found (agent-only Docker image)"

      - name: Build Docker image
        run: docker build -t ebpfsentinel:integration-test .

      - name: Suite 09 — Docker Deployment
        run: bats --timing tests/integration/suites/09-docker.bats

  # ── eBPF tests (suite 06 — gated to main/dispatch) ──────────────
  test-ebpf:
    name: eBPF Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6

      - name: Download agent binary
        uses: actions/download-artifact@v8
        with:
          name: ebpfsentinel-agent
          path: target/release/

      - name: Make agent executable
        run: chmod +x target/release/ebpfsentinel-agent

      - uses: ./.github/actions/install-bats

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq python3-scapy
          # Try kernel-specific package first, then generic linux-tools-common
          sudo apt-get install -y "linux-tools-$(uname -r)" 2>/dev/null \
            || sudo apt-get install -y linux-tools-common linux-tools-generic 2>/dev/null \
            || echo "::warning::bpftool not available — eBPF tests will be skipped"

      - name: Suite 06 — eBPF Programs
        run: sudo bats --timing tests/integration/suites/06-ebpf-programs.bats

      - name: Suite 40 — L2 VIP Announcer
        run: sudo bats --timing tests/integration/suites/40-ebpf-vip-announcer-scenarios.bats

  # ── 3-VM transit topology (nightly, self-hosted Vagrant runner) ──
  # Real execution requires Vagrant + VirtualBox + nested virt, which the
  # hosted GitHub runners do not provide. The job is gated to runners
  # carrying the `vagrant` label; on the nightly cron schedule and on
  # explicit dispatch only. Without such a runner the workflow run skips
  # the job rather than failing.
  integration-3vm:
    name: 3-VM Transit Integration
    if: github.event.schedule == '0 4 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, vagrant]
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v6

      - name: Sanity-check 3-VM scripts
        run: |
          bash -n tests/integration/scripts/run-in-3vm.sh
          bash -n tests/integration/vagrant/provision/setup-backend.sh

      - name: Validate coverage-matrix topology tags
        run: |
          python3 -m pip install --user pyyaml
          python3 - <<'PY'
          import sys, yaml
          with open("tests/integration/coverage-matrix.yaml") as f:
              doc = yaml.safe_load(f)
          allowed = {"none", "2vm", "3vm", "docker", "k8s"}
          bad = []
          for section in ("ebpf_programs", "cli_subcommands", "domain_modules"):
              for row in doc.get(section, []) or []:
                  topo = row.get("topology", "any")
                  if topo not in allowed:
                      bad.append((section, row.get("program") or row.get("subcommand") or row.get("module"), topo))
          if bad:
              for s, k, t in bad:
                  print(f"::error::{s} entry '{k}' has invalid topology '{t}'", file=sys.stderr)
              sys.exit(1)
          PY

      - name: Boot 3-VM transit topology
        run: |
          cd tests/integration/vagrant
          VAGRANT_3VM=1 vagrant up agent attacker backend

      - name: Run transit-tagged suites
        run: bash tests/integration/scripts/run-in-3vm.sh --skip-provision --transit-only

      - name: Tear down VMs
        if: always()
        run: |
          cd tests/integration/vagrant
          VAGRANT_3VM=1 vagrant destroy -f agent attacker backend || true

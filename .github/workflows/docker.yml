name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      - uses: docker/setup-qemu-action@v3

      - name: Stamp version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-common/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-helpers/Cargo.toml
          # eBPF programs
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/xdp-firewall/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/xdp-ratelimit/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/xdp-loadbalancer/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-conntrack/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-nat-ingress/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-nat-egress/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-ids/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-threatintel/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-dns/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-scrub/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/tc-qos/Cargo.toml
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" crates/ebpf-programs/uprobe-dlp/Cargo.toml

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

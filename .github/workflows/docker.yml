name: Docker

on:
  workflow_call:
    inputs:
      version:
        description: "Version to build (e.g. 2026.3.1). If empty, auto-resolves from git."
        required: false
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 2026.3.1). If empty, auto-resolves from git."
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_DESCRIPTION: High-performance eBPF network security agent

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Prepare: resolve version and repo name ────────────────────────
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      name_lower: ${{ steps.repo.outputs.name_lower }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0-dev.$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Lowercase repository name
        id: repo
        run: |
          echo "name_lower=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

  # ── Build per-platform images ─────────────────────────────────────
  build-images:
    name: Build (${{ matrix.platform }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract platform architecture
        run: echo "PLATFORM_ARCH=${platform##*/}" >> "$GITHUB_ENV"
        env:
          platform: ${{ matrix.platform }}

      - uses: docker/setup-buildx-action@v3

      - name: Stamp version in Cargo.toml
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          find . -name Cargo.toml -exec grep -l '0.0.0-dev' {} + \
            | xargs sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/"

      - name: Generate metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.name_lower }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}-${{ env.PLATFORM_ARCH }}
          labels: |
            org.opencontainers.image.title=eBPFsentinel
            org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }} (${{ env.PLATFORM_ARCH }})
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}
            org.opencontainers.image.vendor=eBPFsentinel
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/ebpfsentinel/ebpfsentinel-docs
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push platform image
        uses: docker/build-push-action@v6
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ env.PLATFORM_ARCH }}
          cache-to: type=gha,scope=${{ env.PLATFORM_ARCH }},mode=max
          outputs: type=image,oci-mediatypes=true

  # ── Create multi-arch manifest ────────────────────────────────────
  create-manifest:
    name: Multi-arch Manifest
    needs: [prepare, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Generate manifest metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ needs.prepare.outputs.name_lower }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest

      - name: Create and push multi-arch manifest
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            --annotation='index:org.opencontainers.image.description=${{ env.IMAGE_DESCRIPTION }}' \
            --annotation='index:org.opencontainers.image.source=https://github.com/${{ github.repository }}' \
            --annotation='index:org.opencontainers.image.licenses=AGPL-3.0-only' \
            '${{ env.REGISTRY }}/${{ needs.prepare.outputs.name_lower }}:${{ needs.prepare.outputs.version }}-amd64' \
            '${{ env.REGISTRY }}/${{ needs.prepare.outputs.name_lower }}:${{ needs.prepare.outputs.version }}-arm64'

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect \
            '${{ env.REGISTRY }}/${{ needs.prepare.outputs.name_lower }}:${{ needs.prepare.outputs.version }}'

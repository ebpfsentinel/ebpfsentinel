name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Format check ──────────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ── Lint ──────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy -- -D warnings

  # ── Unit tests ────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test

  # ── Dependency audit (license, advisories, bans) ─────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Vulnerability scan (Cargo.lock) ─────────────────────────────
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── Code coverage ────────────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --exclude ebpf-common \
            --lcov --output-path lcov.info
      - name: Per-crate coverage summary
        run: |
          cargo llvm-cov --workspace --exclude ebpf-common --text 2>&1 | tee coverage-summary.txt
          echo "## Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - name: Enforce coverage floors
        run: |
          domain_cov=$(cargo llvm-cov --package domain --text 2>&1 | grep 'TOTAL' | awk '{print $NF}' | tr -d '%')
          app_cov=$(cargo llvm-cov --package application --text 2>&1 | grep 'TOTAL' | awk '{print $NF}' | tr -d '%')
          adapters_cov=$(cargo llvm-cov --package adapters --text 2>&1 | grep 'TOTAL' | awk '{print $NF}' | tr -d '%')
          echo "domain: ${domain_cov}% (floor: 90%)"
          echo "application: ${app_cov}% (floor: 80%)"
          echo "adapters: ${adapters_cov}% (floor: 60%)"
          failed=0
          if [ "$(echo "$domain_cov < 90" | bc -l)" = "1" ]; then
            echo "::error::Domain coverage ${domain_cov}% is below 90% floor"
            failed=1
          fi
          if [ "$(echo "$app_cov < 80" | bc -l)" = "1" ]; then
            echo "::error::Application coverage ${app_cov}% is below 80% floor"
            failed=1
          fi
          if [ "$(echo "$adapters_cov < 60" | bc -l)" = "1" ]; then
            echo "::error::Adapters coverage ${adapters_cov}% is below 60% floor"
            failed=1
          fi
          exit $failed
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

  # ── Build release binary ──────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo build --release --bin ebpfsentinel-agent
      - uses: actions/upload-artifact@v4
        with:
          name: ebpfsentinel-agent-x86_64
          path: target/release/ebpfsentinel-agent
          retention-days: 7

name: Security

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ── Vulnerability scan ───────────────────────────────────────────
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install cargo-audit
        run: cargo install cargo-audit@0.22.1
      - name: Run cargo audit
        run: cargo audit

  # ── License and advisory check ───────────────────────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ── Unsafe code audit ────────────────────────────────────────────
  unsafe-audit:
    name: Unsafe Code Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Verify forbid(unsafe_code) in pure-logic crates
        run: |
          for crate in domain ports application infrastructure; do
            if ! grep -q 'forbid(unsafe_code)' "crates/$crate/src/lib.rs"; then
              echo "ERROR: crates/$crate/src/lib.rs missing #![forbid(unsafe_code)]"
              exit 1
            fi
          done
          echo "All pure-logic crates forbid unsafe code"

      - name: Verify deny(unsafe_code) in adapters
        run: |
          if ! grep -q 'deny(unsafe_code)' "crates/adapters/src/lib.rs"; then
            echo "ERROR: crates/adapters/src/lib.rs missing #![deny(unsafe_code)]"
            exit 1
          fi
          echo "Adapters crate denies unsafe code (with targeted allows)"

      - name: Count unsafe blocks
        run: |
          echo "=== Unsafe code usage ==="
          grep -rn "unsafe " crates/ --include="*.rs" | grep -v "//.*unsafe" | grep -v "forbid\|deny\|allow" || echo "No unsafe blocks found"

  # ── Miri: UB detection on shared eBPF types ─────────────────────
  miri:
    name: Miri (ebpf-common)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Run Miri on ebpf-common
        run: cargo +nightly miri test -p ebpf-common
        env:
          MIRIFLAGS: -Zmiri-tree-borrows

  # ── cargo-careful: extra UB checks on userspace crates ─────────
  careful:
    name: Careful Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libpcap-dev
      - name: Install cargo-careful
        run: cargo +nightly install cargo-careful
      - name: Run tests with extra UB checks
        run: cargo +nightly careful test --workspace --exclude ebpf-common

  # ── Fuzz testing (critical parsers) ──────────────────────────────
  fuzz:
    name: Fuzz Critical Parsers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libpcap-dev
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz
      - name: Fuzz DNS parser
        run: cargo +nightly fuzz run fuzz_dns_parser -- -max_len=4096 -max_total_time=30
      - name: Fuzz L7 parsers
        run: cargo +nightly fuzz run fuzz_l7_parsers -- -max_len=2048 -max_total_time=30
      - name: Fuzz feed parser
        run: cargo +nightly fuzz run fuzz_feed_parser -- -max_len=8192 -max_total_time=30
      - name: Fuzz config
        run: cargo +nightly fuzz run fuzz_config -- -max_len=8192 -max_total_time=30
      - name: Fuzz packet event
        run: cargo +nightly fuzz run fuzz_packet_event -- -max_len=256 -max_total_time=15
      - name: Fuzz DLP scan
        run: cargo +nightly fuzz run fuzz_dlp_scan -- -max_len=4096 -max_total_time=15
      - name: Fuzz auth
        run: cargo +nightly fuzz run fuzz_auth -- -max_len=2048 -max_total_time=15
      - name: Fuzz firewall
        run: cargo +nightly fuzz run fuzz_firewall -- -max_len=1024 -max_total_time=15

  # ── SBOM generation ──────────────────────────────────────────────
  sbom:
    name: SBOM (CycloneDX)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx
      - name: Generate SBOM
        run: cargo cyclonedx --format json --all
      - name: Collect SBOM files
        run: |
          mkdir -p sbom-output
          find . -name "*.cdx.json" -not -path "./sbom-output/*" -exec cp {} sbom-output/ \;
          ls -la sbom-output/
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom-output/
          retention-days: 7

# config-ebpf-pktgen-pass.yaml — Baseline fixture for perf/04 (pktgen).
#
# Boots the agent with a single XDP firewall rule that **passes** the
# pktgen UDP flood (dst port 9). Used to measure the worst-case CPU
# baseline: the kernel actually processes every packet up the network
# stack instead of dropping it at the XDP hook.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "127.0.0.1"
  log_level: info
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  mode: block
  default_policy: pass
  rules:
    - id: fw-pktgen-pass
      priority: 10
      action: allow
      protocol: udp
      dst_port: 9
      scope: global
      enabled: true

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

ddos:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

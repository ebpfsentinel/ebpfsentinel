# Integration test coverage matrix
#
# Source of truth that maps every observable agent surface
# (eBPF program, CLI subcommand, domain module) to the bats suite(s)
# that exercise it. Read by `scripts/audit-coverage.sh` on every CI run.
#
# Schema:
#   coverage[].kind        one of: ebpf_program | cli_subcommand | domain_module
#   coverage[].feature     identifier (must match enumerable name on disk)
#   coverage[].suites      list of bats suite ids ("11", "32") or ["TBD"]
#   coverage[].topology    none | 2vm | 3vm | docker | k8s
#   coverage[].kernel_min  string ("6.9" minimum, "n/a" when no eBPF)
#   coverage[].profile     pr | nightly | manual
#   coverage[].notes       short free-text, optional
#
# Rules:
#   - Every eBPF program under crates/ebpf-programs/* MUST have a row
#     of kind ebpf_program with the same dir name as feature.
#   - Every variant of `pub enum Command` in crates/agent/src/cli.rs
#     MUST have a row of kind cli_subcommand (lowercase variant name).
#   - Every dir under crates/domain/src/ except `common` MUST have a
#     row of kind domain_module. `common` is shared types, no surface
#     of its own, allowed to be skipped via `skip_domains` list below.
#   - `suites: [TBD]` is permitted but tracked as a gap in CI summary.
#   - Suites listed must exist under tests/integration/suites/.

# Domains intentionally not test-mapped (shared types, no behaviour).
skip_domains:
  - common

coverage:
  # ── eBPF programs (15) ──────────────────────────────────────────

# ── Attack suites (per-suite tagging) ────────────────────────────────
# Rows above map features → suites. The block below tags each Wave-2
# attack suite individually so CI scheduling (nightly vs PR) and
# topology requirements can be looked up by suite id without scanning
# the cross-product of feature rows.

attack_suites:
  - suite: "41"
    name: mhddos-l7-attacks
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "ips", "ratelimit", "ddos", "ids"]
    notes: "MHDDoS GET/POST/STRESS/BYPASS/OVH/TLS/CFB/SLOW multi-method floods"

  - suite: "42"
    name: pktgen-high-pps
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-firewall", "xdp-ratelimit", "tc-ids"]
    notes: "≥1 Mpps via kernel pktgen; asserts XDP-drop CPU savings + SYN cookie path"

  - suite: "43"
    name: slowhttptest-slow-attacks
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "ids", "ips", "ddos"]
    notes: "Slowloris / RUDY / Slowread via slowhttptest; asserts IPS auto-blacklist + MITRE T1499.002 + false-positive guard"

  - suite: "44"
    name: scapy-amplification
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-firewall", "tc-scrub", "ddos"]
    notes: "Spoofed-source DNS ANY / NTP monlist / SSDP / Memcached probes; asserts pre-response drop + MITRE T1498.002 + zero egress amplification"

  - suite: "45"
    name: ja4-fingerprint-diversity
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "fingerprints"]
    notes: "Diverse TLS clients (curl/openssl/urllib3/aiohttp/go/MHDDoS) populate JA4 cache; asserts cache growth + MITRE T1071 tag on malicious-SNI alert + ja4_fingerprint surfaces on /api/v1/alerts + FP guard for legit SNI + endpoint liveness after agent restart"

  - suite: "46"
    name: xdp-firewall-reject
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-firewall", "xdp-firewall-reject"]
    notes: "Forged-reply wire validation: TCP RST yields ECONNREFUSED + valid checksum + swapped src/dst; UDP yields ICMP type 3 code 3; whitelisted source bypasses reject path; rejected metric increments"

  - suite: "47"
    name: xdp-ratelimit-syncookie
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-ratelimit", "xdp-ratelimit-syncookie", "ddos"]
    notes: "SYN flood: nstat TcpExtSyncookiesSent and agent syncookie_sent metric grow, legit ncat completes 3-way via cookie, spoofed-source flood leaves TcpExtSyncookiesRecv flat"

  - suite: "48"
    name: lb-dsr-maglev
    topology: 3vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-loadbalancer", "xdp-vip-announcer", "loadbalancer"]
    notes: "L2 DSR end-to-end: agent rewrites dst MAC and the backend→client return bypasses it; Maglev rebuild on backend removal stays under the 2/N disruption bound; XDP ARP responder answers on the client subnet; gratuitous-ARP takeover metric increments; is_self_announced() suppresses self-ARP alerts"

  - suite: "49"
    name: dns-doh-dot-detect
    topology: 3vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["tc-dns", "l7", "dns"]
    notes: "DoH detection via TLS ClientHello SNI on built-in resolver list and on custom dns.doh_resolvers entry; DoT detection by dst_port 853; plain UDP/53 traffic does not raise an EncryptedDns alert (FP guard)"

  - suite: "50"
    name: scrub-byte-level
    topology: 3vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["tc-scrub", "firewall"]
    notes: "Byte-level pcap assertions on the post-transit backend capture: TTL floor (min_ttl raises low TTL to 64), TCP MSS option clamped to max_mss=1400, IPv4 DF flag cleared, IPv4 identification randomized away from sender-chosen value; fragment-policy AC deferred (no ScrubConfig knob yet)"

  - suite: "51"
    name: conntrack-kernel-ct-kill
    topology: 3vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["tc-conntrack", "xdp-firewall", "firewall", "conntrack"]
    notes: "Established iperf3 flow tracked by kernel netfilter conntrack on the transit agent; mid-flow deny rule POST triggers kill_flow_via_xdp_ct kfunc; CT entry disappears within seconds and does not re-establish while the rule is active; removing the rule restores forwarding"

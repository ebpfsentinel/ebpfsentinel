# ── Attack suites (per-suite tagging) ────────────────────────────────
# Rows above map features → suites. The block below tags each Wave-2
# attack suite individually so CI scheduling (nightly vs PR) and
# topology requirements can be looked up by suite id without scanning
# the cross-product of feature rows.

attack_suites:
  - suite: "41"
    name: mhddos-l7-attacks
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "ips", "ratelimit", "ddos", "ids"]
    notes: "MHDDoS GET/POST/STRESS/BYPASS/OVH/TLS/CFB/SLOW multi-method floods"

  - suite: "42"
    name: pktgen-high-pps
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-firewall", "xdp-ratelimit", "tc-ids"]
    notes: "≥1 Mpps via kernel pktgen; asserts XDP-drop CPU savings + SYN cookie path"

  - suite: "43"
    name: slowhttptest-slow-attacks
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "ids", "ips", "ddos"]
    notes: "Slowloris / RUDY / Slowread via slowhttptest; asserts IPS auto-blacklist + MITRE T1499.002 + false-positive guard"

  - suite: "44"
    name: scapy-amplification
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["xdp-firewall", "tc-scrub", "ddos"]
    notes: "Spoofed-source DNS ANY / NTP monlist / SSDP / Memcached probes; asserts pre-response drop + MITRE T1498.002 + zero egress amplification"

  - suite: "45"
    name: ja4-fingerprint-diversity
    topology: 2vm
    kernel_min: "6.9"
    profile: nightly
    surfaces: ["l7", "fingerprints"]
    notes: "Diverse TLS clients (curl/openssl/urllib3/aiohttp/go/MHDDoS) populate JA4 cache; asserts cache growth + MITRE T1071 tag on malicious-SNI alert + ja4_fingerprint surfaces on /api/v1/alerts + FP guard for legit SNI + endpoint liveness after agent restart"

  - suite: "46"
    name: xdp-firewall-reject
    topology: 2vm

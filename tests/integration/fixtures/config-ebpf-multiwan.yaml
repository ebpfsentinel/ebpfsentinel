# config-ebpf-multiwan.yaml — Multi-WAN failover scenario fixture.
#
# Defines two gateways (primary, secondary) with active health checks.
# Both probe targets are unreachable so the routing service tracks them
# in a deterministic state regardless of host network reachability.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  allow_unauthenticated_api: true
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

routing:
  enabled: true
  gateways:
    - id: 1
      name: gw-primary
      interface: __INTERFACE__
      gateway_ip: "10.200.0.254"
      priority: 10
      enabled: true
      health_check:
        target: "10.200.0.254"
        protocol: icmp
        interval_secs: 1
        timeout_secs: 1
        failure_threshold: 3
        recovery_threshold: 2
    - id: 2
      name: gw-secondary
      interface: __INTERFACE__
      gateway_ip: "10.200.0.253"
      priority: 20
      enabled: true
      health_check:
        target: "10.200.0.253"
        protocol: icmp
        interval_secs: 1
        timeout_secs: 1
        failure_threshold: 3
        recovery_threshold: 2

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

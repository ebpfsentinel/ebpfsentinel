# config-ebpf-vip-announcer.yaml — L2 VIP announcer (speaker) scenario config
# Tests: bounded XDP ARP responder, gratuitous ARP on takeover, metrics.
#
# Network topology:
#   Host: 10.200.0.1 (veth-ebpf0)   <- XDP entry point (firewall chain)
#   NS:   10.200.0.2 (veth-ebpf1 inside ebpf-test-ns)
#   VIP:  10.200.0.50  (claimed by this node while elected speaker)

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

loadbalancer:
  enabled: true
  services: []
  announce:
    role: primary
    interface: __INTERFACE__
    vips:
      - name: web-vip
        addr: 10.200.0.50

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

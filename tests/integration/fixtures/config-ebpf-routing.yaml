# config-ebpf-routing.yaml — Dynamic routing eBPF scenario test config
# Note: gateway 10.200.0.254 does not exist — health will be "unknown"/"down".

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

routing:
  enabled: true
  gateways:
    - id: 1
      name: gw-test-primary
      interface: __INTERFACE__
      gateway_ip: "10.200.0.254"
      priority: 10
      enabled: true
      health_check:
        target: "10.200.0.254"
        protocol: icmp
        interval_secs: 5
        timeout_secs: 2
        failure_threshold: 3
        recovery_threshold: 2

l7:
  enabled: false

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

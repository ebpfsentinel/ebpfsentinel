# config-minimal.yaml — Minimal agent configuration for integration tests.
# Uses loopback interface, firewall-only mode, non-default ports to avoid conflicts.

agent:
  interfaces:
    - lo
  bind_address: "0.0.0.0"
  log_level: info
  log_format: json
  http_port: 8080
  grpc_port: 50051
  grpc_reflection: true
  metrics_port: 9090
  swagger_ui: true

firewall:
  enabled: true
  mode: alert
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

# config-ebpf-alert-e2e.yaml — Alert lifecycle end-to-end test config
# Tests: trigger IDS alert on port 4444, query, mark false positive

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 18080
  grpc_port: 50151
  metrics_port: 19090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: true
  mode: alert
  rules:
    # Single rule: detect traffic on TCP/4444
    - id: ids-alert-test
      description: "Alert lifecycle test rule"
      severity: high
      protocol: tcp
      dst_port: 4444
      enabled: true

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max_per_window: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

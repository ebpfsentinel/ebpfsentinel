# config-ebpf-dns-encrypted.yaml — DoH/DoT detection scenario, 3-VM transit.
#
# Drives the encrypted-DNS detector wired into the agent's L7 TLS handshake
# parser. ClientHellos that match a known DoH SNI (built-in resolver list +
# custom `dns.doh_resolvers`) or land on UDP/TCP :853 surface a DnsAlert
# with reason "Encrypted DNS detected" on /api/v1/alerts.

agent:
  interfaces:
    - eth1
    - eth2
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

dns:
  enabled: true
  doh_resolvers:
    - corp-doh.test
  cache:
    max_entries: 1000
    min_ttl_secs: 60
    purge_interval_secs: 30
  blocklist:
    domains: []
    action: block
    inject_target: threatintel
    grace_period_secs: 300
  reputation:
    enabled: false

l7:
  enabled: true
  ports: [443, 853, 80, 8080, 8443]
  rules: []

alerting:
  enabled: true

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

# config-ebpf-pktgen-drop.yaml — XDP early-drop fixture for suite 42.
#
# Boots the agent with a single XDP firewall rule that **drops** the
# pktgen UDP flood (dst port 9). Used to demonstrate the CPU savings
# of early XDP drop relative to the pass-fixture baseline.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: info
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  mode: block
  default_policy: pass
  rules:
    - id: fw-pktgen-drop
      priority: 10
      action: deny
      protocol: udp
      dst_port: 9
      scope: global
      enabled: true

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

ddos:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

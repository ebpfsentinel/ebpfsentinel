# config-ebpf-responses.yaml — Response engine lifecycle (suite 52).
#
# Drives the in-memory response engine via /api/v1/responses/manual.
# Firewall is enabled so the audit subsystem has a sensible context;
# the response engine itself is always wired in startup and does not
# require a dedicated config knob. Audit logs are persisted to redb so
# the suite can read back the create/revoke trail.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: true

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

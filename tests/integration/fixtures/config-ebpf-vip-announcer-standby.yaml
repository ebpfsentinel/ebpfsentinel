# config-ebpf-vip-announcer-standby.yaml — L2 VIP announcer (standby) config
# Tests split-brain safety: a standby node must NEVER answer ARP for a VIP
# and must NEVER emit gratuitous ARP (VIP_SET stays empty).
#
# Same topology / VIP as config-ebpf-vip-announcer.yaml, role=standby.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  allow_unauthenticated_api: true
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

loadbalancer:
  enabled: true
  services: []
  announce:
    role: standby
    interface: __INTERFACE__
    vips:
      - name: web-vip
        addr: 10.200.0.50

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel-test
  labels:
    app.kubernetes.io/name: ebpfsentinel
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      serviceAccountName: ebpfsentinel
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: agent
          image: ebpfsentinel:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: grpc
              containerPort: 50051
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          # Startup can take a little while (eBPF program load + attach) before
          # the HTTP server binds. A startupProbe holds off the liveness probe
          # until the agent is actually serving, so a slow boot never trips a
          # spurious restart (up to ~120s of grace).
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 5
          volumeMounts:
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: btf
              mountPath: /sys/kernel/btf
              readOnly: true
            - name: debug-fs
              mountPath: /sys/kernel/debug
              readOnly: true
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: config
          configMap:
            name: ebpfsentinel-config
            # The agent refuses a world-readable config file; ConfigMap volumes
            # default to 0644, so restrict to owner-only (the container is root).
            defaultMode: 0640
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: DirectoryOrCreate
        - name: btf
          hostPath:
            path: /sys/kernel/btf
            type: Directory
        - name: debug-fs
          hostPath:
            path: /sys/kernel/debug
            type: Directory
        - name: data
          emptyDir: {}

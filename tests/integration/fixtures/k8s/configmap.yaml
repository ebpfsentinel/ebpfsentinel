apiVersion: v1
kind: ConfigMap
metadata:
  name: ebpfsentinel-config
  namespace: ebpfsentinel-test
  labels:
    app.kubernetes.io/name: ebpfsentinel
data:
  config.yaml: |
    agent:
      interfaces:
        - eth0
      # Bind on all interfaces (default is 127.0.0.1) so the kubelet's
      # liveness/readiness HTTP probes — which hit the pod/node IP, not
      # loopback — can reach /healthz and /readyz.
      bind_address: "0.0.0.0"
      # BPF token is the production default, but a nested minikube-on-docker
      # node can't delegate a bpffs; this pod is privileged, so load eBPF the
      # capability way for a deterministic deployment-mechanics test.
      bpf_token:
        enabled: false
      log_level: info
      log_format: json
      http_port: 8080
      grpc_port: 50051
      metrics_port: 9090

    firewall:
      enabled: true
      mode: alert
      rules: []

    ids:
      enabled: false

    ips:
      enabled: false

    dlp:
      enabled: false

    ratelimit:
      enabled: false

    threatintel:
      enabled: false

    l7:
      enabled: false

    alerting:
      enabled: false

    audit:
      enabled: true
      storage_path: /data/audit.redb

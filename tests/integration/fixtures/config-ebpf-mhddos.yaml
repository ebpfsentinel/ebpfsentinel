# config-ebpf-mhddos.yaml — Suite 41 (MHDDoS L7 multi-method) fixture.
#
# Enables the three surfaces under test in one agent instance:
#   - L7 firewall (HTTP path + TLS SNI matching)
#   - IPS with auto-blacklist (threshold 3, source-IP scoped)
#   - Global rate limiter (token bucket, low rate to make exhaustion
#     observable within a 30 s attack window)
#
# Whitelist deliberately excludes the attacker subnet (192.168.56.20)
# so auto-blacklist can fire; the local agent subnet stays whitelisted
# to keep control-plane probes from the BATS host alive.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: true
  mode: alert
  rules:
    - id: ids-l7-flood
      description: "L7 HTTP flood signature"
      severity: high
      protocol: tcp
      dst_port: 8080
      enabled: true
    - id: ids-tls-flood
      description: "TLS handshake flood signature"
      severity: high
      protocol: tcp
      dst_port: 8443
      enabled: true

ips:
  enabled: true
  mode: block
  auto_blacklist_threshold: 3
  max_blacklist_duration_secs: 300
  max_blacklist_size: 1000
  whitelist:
    - "127.0.0.0/8"
  rules:
    - id: ips-l7-flood-block
      description: "Block sources flooding HTTP"
      severity: high
      protocol: tcp
      dst_port: 8080
      mode: block
      enabled: true
      threshold:
        type: threshold
        count: 50
        window_secs: 10
        track_by: src_ip
    - id: ips-tls-flood-block
      description: "Block sources flooding TLS"
      severity: high
      protocol: tcp
      dst_port: 8443
      mode: block
      enabled: true
      threshold:
        type: threshold
        count: 50
        window_secs: 10
        track_by: src_ip

ratelimit:
  enabled: true
  default_rate: 200
  default_burst: 400
  default_algorithm: token_bucket
  rules:
    - id: rl-mhddos-global
      rate: 200
      burst: 400
      scope: global
      algorithm: token_bucket
      action: drop
      enabled: true

dlp:
  enabled: false

threatintel:
  enabled: false

ddos:
  enabled: true
  syn_flood_threshold: 100
  udp_flood_threshold: 100
  icmp_flood_threshold: 100

l7:
  enabled: true
  rules:
    - id: l7-mhddos-deny-flood-path
      priority: 10
      action: deny
      protocol: http
      path: "/flood"
      enabled: true
    - id: l7-mhddos-allow-root
      priority: 100
      action: allow
      protocol: http
      path: "/"
      enabled: true
    - id: l7-mhddos-tls-deny-attacker-sni
      priority: 10
      action: deny
      protocol: tls
      sni: "attacker.test"
      enabled: true

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

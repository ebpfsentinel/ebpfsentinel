# config-ebpf-scrub-byte.yaml — tc-scrub byte-level normalization, 3-VM.
#
# Attaches tc-scrub to both transit interfaces; the agent rewrites IPv4
# headers (TTL floor, IP-ID randomize, DF clear) and the TCP MSS option
# on transit. Crafted attacker → backend packets are inspected on the
# backend's NIC after passing through the agent's TC pipeline.

agent:
  interfaces:
    - eth1
    - eth2
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []
  scrub:
    enabled: true
    min_ttl: 64
    max_mss: 1400
    clear_df: true
    random_ip_id: true
    drop_fragments: true

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: false

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

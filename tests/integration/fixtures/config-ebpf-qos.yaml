# config-ebpf-qos.yaml — QoS (tc-qos) eBPF scenario test config

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: false

ratelimit:
  enabled: false

threatintel:
  enabled: false

ddos:
  enabled: false

l7:
  enabled: false

qos:
  enabled: true
  scheduler: fifo
  pipes:
    - id: pipe-test-10m
      bandwidth: "10mbps"
      delay: 0
      loss: 0.0
      burst: "64kb"
      priority: 1
      direction: egress
      enabled: true
  queues:
    - id: queue-test-1
      pipe_id: pipe-test-10m
      weight: 100
      enabled: true
  classifiers:
    - id: cls-test-iperf
      queue_id: queue-test-1
      priority: 0
      match:
        dst_port: 5201
        protocol: tcp

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

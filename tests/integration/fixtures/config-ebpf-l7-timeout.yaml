# config-ebpf-l7-timeout.yaml — Suite 43 (slowhttptest) fixture.
#
# Combines:
#   - L7 reassembly with a tight idle_timeout_secs so half-completed
#     slow requests (slowloris / RUDY / slowread) are flushed early.
#   - IDS signatures on the HTTP port that fire one event per slow flow
#     forcibly closed by the reassembler.
#   - IPS auto-blacklist with a low threshold so the attacker IP is
#     promoted to the blacklist within ~10 s.
#   - DDoS service-exhaustion policy so the alert path emits a
#     MITRE T1499.002 tag.
#
# Whitelist: loopback only — the attacker subnet stays floodable.

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 8080
  grpc_port: 50051
  metrics_port: 9090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: true
  mode: alert
  rules:
    - id: ids-slowhttp-headers
      description: "Slow-headers / slowloris signature"
      severity: high
      protocol: tcp
      dst_port: 8080
      enabled: true
    - id: ids-slowhttp-body
      description: "Slow-body / RUDY signature"
      severity: high
      protocol: tcp
      dst_port: 8080
      enabled: true

ips:
  enabled: true
  mode: block
  auto_blacklist_threshold: 3
  max_blacklist_duration_secs: 300
  max_blacklist_size: 1000
  whitelist:
    - "127.0.0.0/8"
  rules:
    - id: ips-slowhttp-block
      description: "Block sources holding slow connections past timeout"
      severity: high
      protocol: tcp
      dst_port: 8080
      mode: block
      enabled: true
      threshold:
        type: threshold
        count: 10
        window_secs: 10
        track_by: src_ip

ratelimit:
  enabled: false

dlp:
  enabled: false

threatintel:
  enabled: false

ddos:
  enabled: true
  policies:
    - id: ddos-slowhttp-service-exhaustion
      attack_type: service_exhaustion
      detection_threshold_pps: 50
      mitigation_action: block
      auto_block_duration_secs: 60
      enabled: true

l7:
  enabled: true
  reassembly:
    enabled: true
    max_flows: 4096
    max_buffer_per_flow: 16384
    idle_timeout_secs: 5
    sweep_interval_secs: 1
  rules:
    - id: l7-slowhttp-deny-incomplete
      priority: 10
      action: deny
      protocol: http
      path: "/slowloris"
      enabled: true
    - id: l7-slowhttp-allow-root
      priority: 100
      action: allow
      protocol: http
      path: "/"
      enabled: true

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

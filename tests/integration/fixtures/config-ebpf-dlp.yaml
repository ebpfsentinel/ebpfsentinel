# config-ebpf-dlp.yaml — DLP (uprobe-dlp) eBPF scenario test config
# Tests: uprobe-dlp program loading, pattern matching, alert mode
#
# Network topology:
#   Host: 10.200.0.1 (veth-ebpf0)
#   NS:   10.200.0.2 (veth-ebpf1 inside ebpf-test-ns)

agent:
  interfaces:
    - __INTERFACE__
  bind_address: "0.0.0.0"
  log_level: debug
  log_format: json
  http_port: 18080
  grpc_port: 50151
  metrics_port: 19090

firewall:
  enabled: true
  default_policy: pass
  rules: []

ids:
  enabled: false

ips:
  enabled: false

dlp:
  enabled: true
  mode: alert
  patterns:
    - id: dlp-pci-card
      name: "Credit Card Number"
      regex: "\\b(?:4[0-9]{12}(?:[0-9]{3})?|5[1-5][0-9]{14})\\b"
      severity: high
      data_type: pci
    - id: dlp-pii-ssn
      name: "Social Security Number"
      regex: "\\b\\d{3}-\\d{2}-\\d{4}\\b"
      severity: critical
      data_type: pii

ratelimit:
  enabled: false

threatintel:
  enabled: false

l7:
  enabled: false

alerting:
  enabled: true
  dedup_window_secs: 5
  throttle_window_secs: 60
  throttle_max: 1000
  routes: []

audit:
  enabled: true
  storage_path: __DATA_DIR__/audit.redb

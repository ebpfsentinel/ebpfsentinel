# eBPFsentinel — Docker Compose deployment (split: warden broker + agent)
#
# Usage:
#   docker compose up -d        # start the warden broker + the agent
#   docker compose logs -f      # view logs
#   docker compose down         # stop
#
# Two containers share a socket volume:
#   - warden : the privileged broker (lean image, no agent stack). Holds
#     CAP_SYS_ADMIN/NET_ADMIN/NET_RAW for bpffs delegation, conntrack, routes,
#     ARP and the pcap pool. Serves the typed warden-proto RPC over an AF_UNIX
#     socket.
#   - agent  : runs non-root (uid 65534) with every capability dropped. It
#     self-unshares a user namespace, has the warden delegate a bpffs, and loads
#     its own eBPF through a BPF token (never CAP_BPF). The host-netns ops it
#     cannot perform from its userns (conntrack/routes/ARP/pcap) are brokered to
#     the warden over the shared socket.
#
# Prerequisites:
#   - Linux kernel 6.9+ with BTF support
#   - Docker with host networking support
#   - Unprivileged user namespaces enabled on the host (the agent unshares one).
#   - On Ubuntu 24.04+ (and other kernels that set
#     kernel.apparmor_restrict_unprivileged_userns=1), unprivileged user-namespace
#     creation is gated by AppArmor. The agent runs as uid 65534 (non-root), so it
#     is subject to this and the userns self-map fails (uid_map: Operation not
#     permitted) regardless of the agent's in-container seccomp/apparmor below —
#     this is a host-level gate. Allow it on the host:
#       sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
#     (persist via /etc/sysctl.d/), or scope it to the agent binary with an
#     AppArmor profile granting `userns` (see dist/apparmor.d/ebpfsentinel-agent).
#   - Config ownership: the agent runs as uid/gid 65534 and rejects a
#     world-readable config (it may hold secrets). Make the bind-mounted file
#     owned by / readable by 65534, mode 0640:
#       sudo chown 65534:65534 ./config/ebpfsentinel.yaml
#       sudo chmod 640 ./config/ebpfsentinel.yaml
#   - SYN-cookie DDoS protection (if enabled) needs net.ipv4.tcp_syncookies=2.
#     With network_mode: host set it on the HOST: sysctl -w net.ipv4.tcp_syncookies=2
#
# Hot-reload: edit config/ebpfsentinel.yaml while running — the agent detects
# changes automatically and reloads rules without restart.

services:
  warden:
    build:
      context: .
      dockerfile: Dockerfile.warden
    image: ebpfsentinel-warden:latest
    container_name: ebpfsentinel-warden
    command: ["serve", "/run/ebpfsentinel/warden.sock", "--uid", "65534"]
    # The warden programs the host network namespace (conntrack, routes, ARP) and
    # attaches to host interfaces.
    network_mode: host
    # Share the host PID namespace so the warden reaches a neighbouring
    # container's /proc/<pid>/root to attach the DLP uprobe against its libssl.
    pid: host
    cap_drop: [ALL]
    cap_add:
      - SYS_ADMIN # bpffs delegation (FSCONFIG_CMD_CREATE), module BTF fds
      - NET_ADMIN # conntrack -D teardown, route programming
      - NET_RAW # AF_PACKET pcap sockets + gratuitous ARP
      - SYS_PTRACE # read a neighbour container's /proc/<pid>/root (DLP)
      - BPF # create the DLP uprobe BPF_LINK_CREATE
      - PERFMON # uprobe attach (perf/tracing)
    security_opt:
      - apparmor=unconfined # delegation does fsconfig/move_mount
      - seccomp=unconfined # mount/bpf/netlink syscalls
    volumes:
      - warden-sock:/run/ebpfsentinel
      # Read-only host /proc so the warden resolves the same
      # /host/proc/<pid>/root/<lib> path the agent sends for a brokered uprobe.
      - /proc:/host/proc:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: ebpfsentinel:latest
    container_name: ebpfsentinel
    depends_on: [warden]
    command: ["--config", "/etc/ebpfsentinel/config.yaml"]
    environment:
      EBPFSENTINEL_WARDEN_SOCK: /run/ebpfsentinel/warden.sock
      # Host proc root for cross-container DLP: the agent resolves neighbouring
      # containers' libssl through this mounted host /proc.
      EBPFSENTINEL_HOST_PROC: /host/proc
    # XDP/TC programs attach to host interfaces; bind_address in config controls
    # which host IP the API listens on.
    network_mode: host
    # Share the host PID namespace for cross-container TLS DLP (see the warden).
    # SECURITY NOTE: this lets the agent see every process on the host — the
    # irreducible cost of node-wide DLP. Drop `pid: host` to scope DLP to the
    # agent's own container.
    pid: host
    user: "65534:65534"
    cap_drop: [ALL] # the warden holds every host capability
    security_opt:
      # The agent self-unshares a user namespace, mounts the delegated bpffs, and
      # loads its own eBPF through the token — so it issues mount/userns/bpf
      # syscalls. It holds NO CAP_SYS_ADMIN, so the Docker default seccomp profile
      # (which gates those syscalls on CAP_SYS_ADMIN) blocks them. Rather than go
      # fully unconfined, this is the Docker default profile plus an unconditional
      # allow for exactly that syscall set (unshare/mount family/bpf) — strictly
      # tighter than seccomp=unconfined. Path resolves from the compose working
      # dir (run `docker compose` from the repo root). Regenerate from a newer
      # Docker default: keep the leading allow block, replace the rest.
      - seccomp=./dist/seccomp/ebpfsentinel-agent.json
      # AppArmor blocks the mount family; left unconfined. A named per-container
      # profile would have to be apparmor_parser-loaded on the host first and
      # would still need broad mount/bpf/netlink access, so the gain is marginal.
      # (No-op on hosts without AppArmor.)
      - apparmor=unconfined
    volumes:
      # Agent configuration — writable for hot-reload via file watcher
      - ./config/ebpfsentinel.yaml:/etc/ebpfsentinel/config.yaml
      # Read-only host cgroupfs. The container resolver maps a packet's cgroup
      # id (recovered on the TC egress hook via bpf_skb_cgroup_id) to a
      # container by walking this hierarchy. The container's own /sys/fs/cgroup
      # is a namespaced subtree that lacks the host cgroup inodes, so without
      # this the resolution fails. Matches container.resolver.cgroup_root
      # (default /sys/fs/cgroup). Same pattern as node-exporter.
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      # Read-only host /proc (EBPFSENTINEL_HOST_PROC) so the agent resolves every
      # node process's libssl for cross-container TLS DLP.
      - /proc:/host/proc:ro
      # The warden's control socket (read-only — the agent only connects).
      - warden-sock:/run/ebpfsentinel:ro
      # Persistent data: audit logs, alerts, rule change history (redb)
      - ebpfsentinel-data:/data
      # Packet captures (POST /api/v1/captures/manual)
      - ebpfsentinel-captures:/var/lib/ebpfsentinel/captures
      # The agent mounts its delegated bpffs here; a container's /sys is
      # read-only, so back the mountpoint with an in-pod tmpfs.
      - type: tmpfs
        target: /sys/fs/bpf
        tmpfs:
          mode: 0o1777

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"

    restart: unless-stopped

    # Uses the agent's built-in CLI health check (no curl needed)
    healthcheck:
      test: ["CMD", "ebpfsentinel-agent", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ebpfsentinel-data:
    driver: local
  ebpfsentinel-captures:
    driver: local
  warden-sock:
    driver: local

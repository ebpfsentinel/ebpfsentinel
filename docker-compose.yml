# eBPFsentinel — Docker Compose deployment
#
# Usage:
#   docker compose up -d        # start agent
#   docker compose logs -f      # view logs
#   docker compose down         # stop agent
#
# Prerequisites:
#   - Linux kernel 6.9+ with BTF support
#   - Docker with host networking support
#   - Config ownership for the bind mount below. eBPF is token-only, so the
#     launcher runs the agent inside a child user namespace. Under Docker the
#     launcher keeps the agent as root (Docker permits the root userns self-map),
#     and the agent rejects a world-readable config (it may hold secrets). So the
#     bind-mounted file must be owned by root with mode 0640 — otherwise it is
#     unreadable (a file owned by another uid appears unmapped to the userns root)
#     or rejected as world-readable. After cloning:
#       sudo chown root:root ./config/ebpfsentinel.yaml
#       sudo chmod 640 ./config/ebpfsentinel.yaml
#     Editing it for hot-reload then also needs root. (The baked-in image copy is
#     already root:root 0640 — to skip this, drop the config volume below and run
#     with the baked default.)
#   - SYN-cookie DDoS protection (if enabled) needs net.ipv4.tcp_syncookies=2.
#     With network_mode: host the container shares (read-only) the host sysctls,
#     so set it on the HOST: sysctl -w net.ipv4.tcp_syncookies=2
#
# eBPF is loaded EXCLUSIVELY through a BPF token (no CAP_BPF). The image
# entrypoint (warden-token) runs as root only long enough to set
# up a delegated bpffs in a child user namespace, then execs the agent inside
# it — the long-running agent is unprivileged and creates the token there.
#
# This single-container layout grants the agent container CAP_SYS_ADMIN for the
# bootstrap. To keep the agent container itself off CAP_SYS_ADMIN (non-root +
# cap-drop ALL), use the split-broker layout instead: dist/docker-compose.broker.yml
# (a privileged `broker` service delegates the bpffs over a socket; the `agent`
# service holds no host capabilities). See operations/deployment/bpf-token.md.
#
# Hot-reload: edit config/ebpfsentinel.yaml while running — the agent
# detects changes automatically and reloads rules without restart.

services:
  agent:
    build: .
    image: ebpfsentinel:latest
    container_name: ebpfsentinel

    # XDP programs attach to host network interfaces directly.
    # WARNING: with network_mode: host the container shares the host's network
    # namespace. bind_address in config controls which host IP the agent listens
    # on — "127.0.0.1" is localhost-only, "0.0.0.0" exposes on all interfaces.
    network_mode: host

    # The image entrypoint is warden-token: as root it sets up the
    # delegated bpffs in a child user namespace and execs the agent there. It
    # needs CAP_SYS_ADMIN (bpffs delegation + module BTF fds) and userns
    # creation — hence apparmor=unconfined. NO CAP_BPF: the token authorizes
    # every eBPF syscall, and the long-running agent runs unprivileged inside
    # the user namespace (no host capabilities).
    cap_add:
      - SYS_ADMIN
      # NET_RAW lets the launcher open the AF_PACKET capture sockets (see NOTE
      # below). It is already in Docker's default capability set — listed here
      # only so packet capture survives a future `cap_drop`.
      - NET_RAW
    security_opt:
      - apparmor=unconfined

    # Override the AF_PACKET capture pool size (default 2) if you run many
    # concurrent captures.
    # environment:
    #   EBPFSENTINEL_PCAP_POOL: "4"
    # NOTE: pcap capture works rootless because the launcher pre-opens the
    # AF_PACKET sockets while still global root and passes the fds to the agent
    # (CAP_NET_RAW is checked only at socket() time). Tune the pool with
    # EBPFSENTINEL_PCAP_POOL (default 2) if you run many concurrent captures.
    #
    # Two host-netns features stay unavailable and cap_add does NOT help: eBPF is
    # token-only so the agent runs in a child user namespace, and a descendant
    # userns is never privileged over the init-userns-owned host netns:
    #   - conntrack -D retroactive teardown (CAP_NET_ADMIN, re-checked per netlink
    #     message against the sender -> fd-passing can't delegate it)
    #   - gratuitous-ARP on VIP takeover (same AF_PACKET path as pcap; not
    #     fd-provisioned today)
    # Their eBPF equivalents (IPS_DYING flow-kill, xdp-vip-announcer) keep working.

    volumes:
      # Agent configuration — writable for hot-reload via file watcher
      - ./config/ebpfsentinel.yaml:/etc/ebpfsentinel/config.yaml
      # Persistent data: audit logs, alerts, rule change history (redb)
      - ebpfsentinel-data:/data
      # Packet captures (POST /api/v1/captures/manual)
      - ebpfsentinel-captures:/var/lib/ebpfsentinel/captures
      # eBPF filesystem — required for map pinning
      - /sys/fs/bpf:/sys/fs/bpf
      # Debug filesystem — required for eBPF tracing
      - /sys/kernel/debug:/sys/kernel/debug:ro

    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
        reservations:
          memory: 256M
          cpus: "0.5"

    restart: unless-stopped

    # Uses the agent's built-in CLI health check (no curl needed)
    healthcheck:
      test: ["CMD", "ebpfsentinel-agent", "health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ebpfsentinel-data:
    driver: local
  ebpfsentinel-captures:
    driver: local

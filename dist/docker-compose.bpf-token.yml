# Docker Compose override for BPF token-delegated loading.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.bpf-token.yml up -d
#
# Kernel 6.9+ required. The token-setup container mounts a delegated
# bpffs on the host before the agent starts; the agent container
# then runs with NET_RAW as the only capability.

services:
  bpf-token-setup:
    image: ebpfsentinel-agent:latest
    entrypoint:
      - /usr/local/bin/ebpfsentinel-token-setup.sh
      - /host/sys/fs/bpf/ebpfsentinel
    privileged: true          # required for bpffs mount + chmod
    pid: host
    volumes:
      - /sys/fs/bpf:/host/sys/fs/bpf:rshared
    restart: "no"

  agent:
    depends_on:
      bpf-token-setup:
        condition: service_completed_successfully
    privileged: false
    cap_drop:
      - ALL
    cap_add:
      - NET_RAW              # pcap capture only
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/ebpfsentinel
    volumes:
      - /sys/fs/bpf:/sys/fs/bpf:ro
      - /proc:/host/proc:ro
      - ./config:/etc/ebpfsentinel:ro
    environment:
      EBPF_BPF_TOKEN_PATH: /sys/fs/bpf/ebpfsentinel

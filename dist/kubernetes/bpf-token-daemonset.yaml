# BPF token-delegated DaemonSet — kernel 6.9+ required.
#
# The container entrypoint (ebpfsentinel-token-launch) sets up a delegated bpffs
# in a child user namespace and execs the agent there, which creates a BPF token
# and loads every program through it. The launcher needs CAP_SYS_ADMIN; the
# long-running agent holds no host capabilities (no CAP_BPF). Because it runs in
# a child user namespace it cannot use host-netns capabilities — pcap capture,
# conntrack -D teardown, and VIP gratuitous-ARP are unavailable (their eBPF
# equivalents keep working). Nested userns may need node-level config.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      containers:
        - name: agent
          image: ebpfsentinel-agent:latest
          # Image entrypoint is ebpfsentinel-token-launch: it sets up the
          # delegated bpffs in a child user namespace and execs the agent there.
          # `args` are appended to the agent invocation by the launcher.
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          securityContext:
            # The launcher needs CAP_SYS_ADMIN (bpffs delegation + module BTF
            # fds) and user-namespace creation; it drops into the userns before
            # exec'ing the agent, which then holds no host capabilities (no
            # CAP_BPF). Nested userns + bpffs delegation may need node config
            # (allow unprivileged userns). pcap / conntrack-kill teardown / VIP
            # gratuitous-ARP are unavailable to the userns agent (eBPF
            # equivalents keep working).
            privileged: false
            allowPrivilegeEscalation: true
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 1Gi
          volumeMounts:
            # No host bpffs mount: the launcher mounts the delegated bpffs in
            # the container's own (user-namespaced) mount namespace.
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ebpfsentinel-config
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
---
# Config stanza operators should include in their ConfigMap. eBPF loads only
# through the BPF token; bpffs_path is optional (defaults to the path the init
# container mounts):
#
# data:
#   config.yaml: |
#     agent:
#       interfaces: [eth0]
#       bpf_token:
#         bpffs_path: /sys/fs/bpf/ebpfsentinel
#     firewall:
#       enabled: true

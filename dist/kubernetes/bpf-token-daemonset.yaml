# BPF token-delegated DaemonSet — kernel 6.9+ required.
#
# The container entrypoint (warden-token) sets up a delegated bpffs
# in a child user namespace and execs the agent there, which creates a BPF token
# and loads every program through it. The launcher needs CAP_SYS_ADMIN; the
# long-running agent holds no host capabilities (no CAP_BPF). Because it runs in
# a child user namespace it cannot use host-netns capabilities — pcap capture,
# conntrack -D teardown, and VIP gratuitous-ARP are unavailable (their eBPF
# equivalents keep working). Nested userns may need node-level config.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      securityContext:
        # Under a stock container runtime the pod runs in the init user
        # namespace, where the launcher cannot map namespace-0 to real root; it
        # therefore drops the userns child to uid/gid 65534, so the agent runs as
        # host gid 65534. This fsGroup makes the 0640 configMap group-readable by
        # it.
        fsGroup: 65534
      containers:
        - name: agent
          image: ebpfsentinel-agent:latest
          # Image entrypoint is warden-token: it sets up the
          # delegated bpffs in a child user namespace and execs the agent there.
          # `args` are appended to the agent invocation by the launcher.
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          securityContext:
            # The launcher needs CAP_SYS_ADMIN (bpffs delegation + module BTF
            # fds) and user-namespace creation; it drops into the userns before
            # exec'ing the agent, which then holds no host capabilities (no
            # CAP_BPF). conntrack-kill teardown / VIP gratuitous-ARP are
            # unavailable to the userns agent (eBPF equivalents keep working).
            privileged: false
            allowPrivilegeEscalation: true
            # Unconfined: the launcher issues mount/move_mount (bpffs delegation)
            # and writes /proc/self/uid_map after unshare(CLONE_NEWUSER). On
            # AppArmor nodes (e.g. Ubuntu) the default container profile blocks
            # these, and the default seccomp profile must not filter the mount
            # syscalls either.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                # NET_RAW: the launcher pre-opens the AF_PACKET pcap socket pool
                # (CAP_NET_RAW is checked only at socket() time). Drop if you
                # never run packet capture.
                - NET_RAW
                # SETUID/SETGID: in the init user namespace the launcher drops
                # the userns child to uid/gid 65534 before self-mapping (it
                # cannot map namespace-0 to real root there); that drop needs
                # SETUID/SETGID.
                - SETUID
                - SETGID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            # A container's /sys is mounted read-only, so the launcher cannot
            # create the /sys/fs/bpf/ebpfsentinel mountpoint there on its own —
            # it needs a writable /sys/fs/bpf. On a real node the host bpffs is
            # a writable mount, so bind it in (HostToContainer). The launcher
            # then mkdirs + move_mounts the *delegated* bpffs over this path in
            # its own private mount namespace.
            - name: bpf
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ebpfsentinel-config
            # The agent rejects a world-readable config file; configMap volumes
            # default to 0644, so pin a stricter mode.
            defaultMode: 0640
        - name: bpf
          # Real node: host bpffs (writable). On nested runtimes (kind, minikube)
          # the node's own /sys/fs/bpf may itself be read-only — replace this
          # hostPath with an in-pod tmpfs instead:
          #   emptyDir: { medium: Memory }
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
---
# Config stanza operators should include in their ConfigMap. eBPF loads only
# through the BPF token; bpffs_path is optional and must match the launcher's
# --bpffs (both default /sys/fs/bpf/ebpfsentinel):
#
# data:
#   config.yaml: |
#     agent:
#       interfaces: [eth0]
#       bpf_token:
#         bpffs_path: /sys/fs/bpf/ebpfsentinel
#     firewall:
#       enabled: true

# BPF token-delegated DaemonSet (combined agent + warden) — kernel 6.9+ required.
#
# The container entrypoint (ebpfsentinel-launch) starts the privileged `warden`
# broker, then execs the agent. The agent self-unshares a user namespace, has the
# warden delegate a bpffs, and loads its own eBPF through a BPF token — holding no
# host capabilities (no CAP_BPF). The warden runs in the init network namespace
# with CAP_SYS_ADMIN/NET_ADMIN/NET_RAW, so the full feature set works (pcap
# capture, conntrack -D teardown, VIP gratuitous-ARP, route programming). Nested
# userns may need node-level config. For the split topology (warden in its own
# container) see warden-daemonset.yaml.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
    app.kubernetes.io/part-of: security
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      securityContext:
        # Under a stock container runtime the pod runs in the init user
        # namespace, where the agent cannot map namespace-0 to real root; it
        # therefore drops to uid/gid 65534, so it runs as host gid 65534. This
        # fsGroup makes the 0640 configMap group-readable by it.
        fsGroup: 65534
      containers:
        - name: agent
          image: ebpfsentinel-agent:latest
          # Image entrypoint is ebpfsentinel-launch: it starts the warden broker,
          # then execs the agent. `args` are appended to the agent invocation.
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          securityContext:
            # The warden holds CAP_SYS_ADMIN (bpffs delegation), CAP_NET_ADMIN
            # (conntrack/routes) and CAP_NET_RAW (pcap pool/ARP); the agent
            # self-unshares a user namespace and loads its own eBPF through the
            # token, holding no host capabilities (no CAP_BPF).
            privileged: false
            allowPrivilegeEscalation: true
            # Unconfined: the warden issues mount/move_mount (bpffs delegation)
            # and the agent writes /proc/self/uid_map after unshare(CLONE_NEWUSER)
            # + mounts the bpffs. On AppArmor nodes (e.g. Ubuntu) the default
            # container profile blocks these, and the default seccomp profile must
            # not filter the mount syscalls either.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop:
                - ALL
              add:
                - SYS_ADMIN
                # NET_ADMIN: warden conntrack -D teardown + route programming.
                - NET_ADMIN
                # NET_RAW: warden AF_PACKET pcap pool + gratuitous ARP. Drop if
                # you never run packet capture (ARP also goes quiet).
                - NET_RAW
                # SETUID/SETGID: in the init user namespace the agent drops to
                # uid/gid 65534 before self-mapping (it cannot map namespace-0 to
                # real root there); that drop needs SETUID/SETGID.
                - SETUID
                - SETGID
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 2
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /etc/ebpfsentinel
              readOnly: true
            # A container's /sys is mounted read-only, so the launcher cannot
            # create the /sys/fs/bpf/ebpfsentinel mountpoint there on its own —
            # it needs a writable /sys/fs/bpf. On a real node the host bpffs is
            # a writable mount, so bind it in (HostToContainer). The launcher
            # then mkdirs + move_mounts the *delegated* bpffs over this path in
            # its own private mount namespace.
            - name: bpf
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
            - name: host-proc
              mountPath: /host/proc
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ebpfsentinel-config
            # The agent rejects a world-readable config file; configMap volumes
            # default to 0644, so pin a stricter mode.
            defaultMode: 0640
        - name: bpf
          # Real node: host bpffs (writable). On nested runtimes (kind, minikube)
          # the node's own /sys/fs/bpf may itself be read-only — replace this
          # hostPath with an in-pod tmpfs instead:
          #   emptyDir: { medium: Memory }
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
---
# Config stanza operators should include in their ConfigMap. eBPF loads only
# through the BPF token; bpffs_path is optional and must match the agent's
# EBPFSENTINEL_BPFFS mount target (both default /sys/fs/bpf/ebpfsentinel):
#
# data:
#   config.yaml: |
#     agent:
#       interfaces: [eth0]
#       bpf_token:
#         bpffs_path: /sys/fs/bpf/ebpfsentinel
#     firewall:
#       enabled: true

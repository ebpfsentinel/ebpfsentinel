# Split-warden DaemonSet (rootless agent) — kernel 6.9+ required.
#
# The warden runs as a NATIVE SIDECAR (an init container with
# restartPolicy: Always, Kubernetes 1.28+): it starts before the agent and keeps
# running alongside it. The warden loads + attaches every eBPF program through a
# BPF token, holds the maps/ring buffers, and serves kernel operations over the
# shared AF_UNIX socket. The agent is the main container and loads NOTHING — a
# pure warden-client consumer that runs under the RuntimeDefault seccomp profile,
# drops every capability, runs non-root with a read-only root filesystem, and
# forbids privilege escalation. An auditor sees the agent fully locked down and
# the entire full-access surface confined to the warden sidecar.
#
# Both containers run the same image; only the entrypoint args differ:
#   warden : warden-token --bpffs <path> ebpfsentinel-agent warden-serve <sock>
#   agent  : ebpfsentinel-agent --config ...   (EBPFSENTINEL_WARDEN_SOCK set)
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      securityContext:
        # The agent runs as uid/gid 65534; fsGroup makes the 0640 configMap
        # group-readable by it (a world-readable config is rejected).
        fsGroup: 65534
      # ── Native sidecar: the privileged warden ─────────────────────────
      initContainers:
        - name: warden
          image: ebpfsentinel-agent:latest
          imagePullPolicy: IfNotPresent
          restartPolicy: Always # native sidecar: starts first, runs for the pod's life
          command:
            - /usr/local/bin/warden-token
            - --bpffs
            - /sys/fs/bpf/ebpfsentinel
            - /usr/local/bin/ebpfsentinel-agent
            - warden-serve
            - /run/ebpfsentinel/warden.sock
            - --uid
            - "65534" # only the agent uid is served (SO_PEERCRED gate)
          securityContext:
            privileged: false
            allowPrivilegeEscalation: true
            # The launcher mounts/move_mounts the delegated bpffs and writes
            # uid_map after unshare(CLONE_NEWUSER); the default AppArmor/seccomp
            # profiles block these. The warden must also retain host-netns
            # CAP_NET_ADMIN/CAP_NET_RAW (conntrack -D, pcap, gratuitous ARP), so
            # on a stock runtime it requires a node that lets it map to real root.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: [ALL]
              add:
                - SYS_ADMIN # bpffs delegation, module BTF fds, BPF token
                - NET_ADMIN # conntrack -D teardown, route programming
                - NET_RAW # AF_PACKET pcap sockets + gratuitous ARP
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits: { cpu: "1", memory: 512Mi }
          volumeMounts:
            - { name: warden-sock, mountPath: /run/ebpfsentinel }
            - { name: config, mountPath: /etc/ebpfsentinel, readOnly: true }
            - name: bpf
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
            - { name: host-proc, mountPath: /host/proc, readOnly: true }
      # ── Rootless agent: non-root, cap-drop ALL, RuntimeDefault seccomp ──
      containers:
        - name: agent
          image: ebpfsentinel-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/ebpfsentinel-agent
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          env:
            - name: EBPFSENTINEL_WARDEN_SOCK
              value: /run/ebpfsentinel/warden.sock
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            # The agent loads nothing — no bpf()/mount/userns syscall — so it runs
            # under the stock profiles with every capability dropped. This is the
            # whole point of the warden split.
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: [ALL]
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          volumeMounts:
            - { name: warden-sock, mountPath: /run/ebpfsentinel, readOnly: true }
            - { name: config, mountPath: /etc/ebpfsentinel, readOnly: true }
            - { name: data, mountPath: /var/lib/ebpfsentinel }
            # Read-only rootfs: provide a writable /tmp.
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: warden-sock
          emptyDir: {}
        - name: config
          configMap:
            name: ebpfsentinel-config
            defaultMode: 0640
        - name: bpf
          # Real node: host bpffs (writable). On nested runtimes (kind, minikube)
          # where the node's /sys/fs/bpf is read-only, replace with:
          #   emptyDir: { medium: Memory }
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: data
          emptyDir: {}
        - name: tmp
          emptyDir: {}

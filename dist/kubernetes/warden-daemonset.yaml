# Split-warden DaemonSet (warden broker + agent) — kernel 6.9+ required.
#
# The warden runs as a NATIVE SIDECAR (an init container with
# restartPolicy: Always, Kubernetes 1.28+): it starts before the agent and keeps
# running alongside it. The warden is the lean broker image (Dockerfile.warden,
# no agent stack): it loads no eBPF and holds no maps — it only delegates a bpffs
# and brokers conntrack/route/ARP/pcap over the shared AF_UNIX socket. The agent
# is the main container: it self-unshares a user namespace, has the warden
# delegate a bpffs, and loads its OWN eBPF through a BPF token. Because the agent
# now does the userns + mount + bpf syscalls itself, it runs Unconfined (not
# RuntimeDefault); the host-netns capabilities stay confined to the warden.
#
# Images differ between the two containers:
#   warden : ebpfsentinel-warden  (warden serve <sock> --uid 65534)
#   agent  : ebpfsentinel-agent   (ebpfsentinel-agent --config ...; EBPFSENTINEL_WARDEN_SOCK set)
#
# For the simpler combined single-container layout see bpf-token-daemonset.yaml.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      securityContext:
        # The agent runs as uid/gid 65534; fsGroup makes the 0640 configMap
        # group-readable by it (a world-readable config is rejected).
        fsGroup: 65534
      # ── Native sidecar: the privileged warden broker ──────────────────
      initContainers:
        - name: warden
          image: ebpfsentinel-warden:latest
          imagePullPolicy: IfNotPresent
          restartPolicy: Always # native sidecar: starts first, runs for the pod's life
          command:
            - /usr/local/bin/warden
            - serve
            - /run/ebpfsentinel/warden.sock
            - --uid
            - "65534" # only the agent uid is served (SO_PEERCRED gate)
          securityContext:
            privileged: false
            allowPrivilegeEscalation: true
            # The warden applies the delegate_* mount options + FSCONFIG_CMD_CREATE
            # (CAP_SYS_ADMIN) and runs conntrack/route/ARP netlink + AF_PACKET; the
            # default AppArmor/seccomp profiles block these.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: [ALL]
              add:
                - SYS_ADMIN # bpffs delegation (FSCONFIG_CMD_CREATE), module BTF fds
                - NET_ADMIN # conntrack -D teardown, route programming
                - NET_RAW # AF_PACKET pcap sockets + gratuitous ARP
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits: { cpu: "1", memory: 256Mi }
          volumeMounts:
            - { name: warden-sock, mountPath: /run/ebpfsentinel }
      # ── Agent: loads its own eBPF via the warden-delegated bpffs ───────
      containers:
        - name: agent
          image: ebpfsentinel-agent:latest
          imagePullPolicy: IfNotPresent
          # Run the agent directly (not the combined launcher): it connects to the
          # sidecar warden instead of starting its own.
          command:
            - /usr/local/bin/ebpfsentinel-agent
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          env:
            - name: EBPFSENTINEL_WARDEN_SOCK
              value: /run/ebpfsentinel/warden.sock
          securityContext:
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: true
            # The agent self-unshares a user namespace, mounts the delegated
            # bpffs, and loads its own eBPF through the token — so it issues
            # mount/unshare/bpf syscalls and needs Unconfined profiles + the
            # privilege drop (SETUID/SETGID). It holds no host-netns capability;
            # conntrack/route/ARP/pcap are brokered to the warden sidecar.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: [ALL]
              add:
                - SETUID
                - SETGID
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          volumeMounts:
            - { name: warden-sock, mountPath: /run/ebpfsentinel, readOnly: true }
            - { name: config, mountPath: /etc/ebpfsentinel, readOnly: true }
            - { name: data, mountPath: /var/lib/ebpfsentinel }
            - name: bpf
              mountPath: /sys/fs/bpf
              mountPropagation: HostToContainer
      volumes:
        - name: warden-sock
          emptyDir: {}
        - name: config
          configMap:
            name: ebpfsentinel-config
            defaultMode: 0640
        - name: bpf
          # Real node: host bpffs (writable). On nested runtimes (kind, minikube)
          # where the node's /sys/fs/bpf is read-only, replace with:
          #   emptyDir: { medium: Memory }
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: data
          emptyDir: {}

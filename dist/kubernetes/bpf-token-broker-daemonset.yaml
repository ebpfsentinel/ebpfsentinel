# Split-broker DaemonSet — kernel 6.9+ required.
#
# Privilege-isolated variant of bpf-token-daemonset.yaml: the privileged bpffs
# delegation + module-BTF/pcap fd provisioning is moved into a small `broker`
# container; the long-running `agent` container runs NON-ROOT + cap-drop ALL +
# no CAP_SYS_ADMIN. An auditor reading this spec sees the agent locked down and
# the full-access surface confined to the tiny broker.
#
# Both containers run the same image; only the entrypoint args differ:
#   broker : ebpfsentinel-token-launch --broker-serve <sock>
#   agent  : ebpfsentinel-token-launch --broker-connect <sock> --bpffs <path> \
#            ebpfsentinel-agent --config ...
# The agent shim creates its own user namespace, hands its bpffs fd to the broker
# for delegation over the shared socket, receives the module-BTF + pcap fds, then
# execs the agent — which creates the token and loads every program through it.
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: ebpfsentinel
  namespace: ebpfsentinel
  labels:
    app.kubernetes.io/name: ebpfsentinel
    app.kubernetes.io/component: agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: ebpfsentinel
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ebpfsentinel
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: ebpfsentinel
      securityContext:
        # The agent runs as uid/gid 65534; fsGroup lets it read the 0640
        # configMap (group-owned by fsGroup) without the file being world-readable
        # (which the agent rejects).
        fsGroup: 65534
      containers:
        # ── Privileged broker: the ONLY full-access component ──────────────
        - name: broker
          image: ebpfsentinel-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/ebpfsentinel-token-launch
            - --broker-serve
            - /run/ebpfsentinel/broker.sock
          securityContext:
            privileged: false
            allowPrivilegeEscalation: true
            # Launcher does mount/move_mount + reads per-module BTF; AppArmor /
            # seccomp default profiles block these on hardened nodes.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: [ALL]
              add:
                - SYS_ADMIN   # bpffs delegation + module BTF fds
                - NET_RAW     # pre-open the AF_PACKET pcap pool
          resources:
            requests: { cpu: 25m, memory: 64Mi }
            limits: { cpu: 250m, memory: 128Mi }
          volumeMounts:
            - { name: broker-sock, mountPath: /run/ebpfsentinel }
        # ── Unprivileged agent: non-root, cap-drop ALL, no SYS_ADMIN ───────
        - name: agent
          image: ebpfsentinel-agent:latest
          imagePullPolicy: IfNotPresent
          command:
            - /usr/local/bin/ebpfsentinel-token-launch
            - --broker-connect
            - /run/ebpfsentinel/broker.sock
            - --bpffs
            - /sys/fs/bpf/ebpfsentinel
            - /usr/local/bin/ebpfsentinel-agent
          args:
            - --config
            - /etc/ebpfsentinel/config.yaml
          securityContext:
            privileged: false
            runAsUser: 65534
            runAsGroup: 65534
            # allowPrivilegeEscalation must be true so the shim can unshare its
            # own user namespace and write uid_map (NoNewPrivs would block it).
            allowPrivilegeEscalation: true
            # The shim does unshare(CLONE_NEWUSER) + mount/move_mount; the default
            # profile blocks them. Prefer the narrow profile in dist/seccomp/ over
            # Unconfined where your node supports localhostProfile.
            appArmorProfile:
              type: Unconfined
            seccompProfile:
              type: Unconfined
            capabilities:
              drop: [ALL]   # NO CAP_SYS_ADMIN, NO CAP_NET_RAW — the broker holds them
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "2", memory: 1Gi }
          volumeMounts:
            - { name: broker-sock, mountPath: /run/ebpfsentinel }
            - { name: config, mountPath: /etc/ebpfsentinel, readOnly: true }
            # The shim mounts the delegated bpffs here; a container's /sys is
            # read-only, so this in-pod tmpfs gives a writable mountpoint (and
            # holds the agent's pinned maps).
            - { name: bpffs, mountPath: /sys/fs/bpf }
            - { name: data, mountPath: /var/lib/ebpfsentinel }
      volumes:
        - name: broker-sock
          emptyDir: {}
        - name: config
          configMap:
            name: ebpfsentinel-config
            defaultMode: 0640
        - name: bpffs
          emptyDir:
            medium: Memory
        - name: data
          emptyDir: {}

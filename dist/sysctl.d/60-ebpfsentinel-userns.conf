# Fallback: allow unprivileged user namespaces for the rootless eBPFsentinel
# agent, which self-unshares one to load eBPF through a BPF token.
#
# Preferred over this is the per-binary AppArmor profile
# (/etc/apparmor.d/ebpfsentinel-agent), which scopes the grant to the agent.
# install.sh drops this in only when the AppArmor restriction is active AND
# apparmor_parser is unavailable to load that profile — note it relaxes the
# restriction host-wide, not just for the agent.
kernel.apparmor_restrict_unprivileged_userns = 0
